<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Табель работы педагогов · Прознание</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Caveat:wght@500;600&display=swap" rel="stylesheet">

<!-- SheetJS для экспорта в .xlsx — подключаем с CDN -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
  :root {
    --yellow:      #FED634;
    --yellow-deep: #C9A800;
    --ink:         #151617;
    --paper:       #F5F5F0;
    --paper-warm:  #FFFBEC;
    --white:       #FFFFFF;
    --moss:        #5C7A2E;
    --green:       #3B6D11;
    --red:         #c0392b;
    --paid-bg:     #F0F0EC;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    font-family: Inter, system-ui, -apple-system, sans-serif;
    color: var(--ink);
    font-size: 14px;
  }

  /* ── Шапка ── */
  .top-bar {
    background: var(--ink); color: var(--white);
    padding: 18px 24px 14px;
  }
  .top-bar-inner {
    max-width: 1600px; margin: 0 auto;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; flex-wrap: wrap;
  }
  .brand { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.55); font-weight: 600; }
  .title { font-family: Geologica, sans-serif; font-weight: 700; font-size: 30px; margin: 4px 0 2px; }
  .title em { font-family: Caveat, cursive; font-weight: 600; font-style: normal; background: var(--yellow); color: var(--ink); padding: 0 12px; border-radius: 4px; }
  .subhead { font-size: 13px; color: rgba(255,255,255,0.65); }

  .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .actions button, .actions a {
    background: transparent; color: var(--white); border: 1px solid rgba(255,255,255,0.3);
    padding: 7px 14px; font-family: Inter; font-size: 12px;
    text-decoration: none; cursor: pointer; border-radius: 4px;
    transition: background 0.15s, color 0.15s;
  }
  .actions button:hover, .actions a:hover { background: var(--yellow); color: var(--ink); border-color: var(--yellow); }

  /* ── Статусбар автосохранения ── */
  .statusbar {
    max-width: 1600px; margin: 0 auto; padding: 10px 24px;
    display: flex; gap: 18px; align-items: center; font-size: 12px; color: rgba(21,22,23,0.65); flex-wrap: wrap;
  }
  .save-status .dot { font-size: 14px; vertical-align: middle; }
  .save-status .dot.ok { color: var(--moss); }
  .save-status .dot.saving { color: var(--yellow-deep); }
  .save-status .dot.err { color: var(--red); }
  .statusbar code { background: var(--white); padding: 2px 7px; border-radius: 3px; font-size: 11px; border: 1px solid rgba(21,22,23,0.15); }

  /* ── Карточки и контейнеры ── */
  .wrap { max-width: 1600px; margin: 0 auto; padding: 4px 24px 40px; }
  .card { background: var(--white); border: 1px solid rgba(21,22,23,0.12); border-radius: 6px; padding: 16px 18px; margin-bottom: 16px; }
  .card-title { font-weight: 700; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(21,22,23,0.65); margin: 0 0 10px; }

  /* ── Блок: список педагогов ── */
  .teachers-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .teacher-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--paper); border: 1px solid rgba(21,22,23,0.15); border-radius: 4px;
    padding: 6px 10px; font-size: 13px;
  }
  .teacher-chip .chip-name { font-weight: 500; }
  .teacher-chip .chip-paid { background: var(--moss); color: var(--white); padding: 1px 6px; border-radius: 2px; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
  .teacher-chip button {
    background: transparent; border: none; color: rgba(21,22,23,0.45); cursor: pointer; font-size: 14px; padding: 0 2px;
  }
  .teacher-chip button:hover { color: var(--red); }
  .teachers-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    background: var(--white); border: 1px solid rgba(21,22,23,0.25); color: var(--ink);
    padding: 7px 14px; font-family: Inter; font-size: 12px; cursor: pointer; border-radius: 4px;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--paper); }
  .btn-primary { background: var(--yellow); border-color: var(--yellow-deep); font-weight: 700; }
  .btn-primary:hover { background: var(--yellow-deep); color: var(--white); }
  .btn-sm { padding: 4px 9px; font-size: 11px; }

  /* ── Основная таблица табеля ── */
  .payroll-wrap { overflow-x: auto; }
  .payroll-table { border-collapse: collapse; width: 100%; min-width: 800px; font-size: 13px; }
  .payroll-table th, .payroll-table td {
    border: 1px solid rgba(21,22,23,0.12); padding: 4px 6px; text-align: center; vertical-align: middle;
    background: var(--white);
  }
  .payroll-table thead th { background: var(--paper-warm); font-weight: 700; font-size: 11px; padding: 6px 6px; }
  .payroll-table thead th.teacher-head { font-size: 13px; background: var(--yellow); color: var(--ink); }
  .payroll-table .col-day { font-weight: 600; background: var(--paper); white-space: nowrap; text-align: left; padding-left: 8px; min-width: 110px; }
  .payroll-table .col-meals input,
  .payroll-table .col-cell input.cell-input {
    width: 56px; padding: 4px 4px; border: 1px solid rgba(21,22,23,0.15); border-radius: 3px;
    font-family: Inter; font-size: 13px; text-align: center; background: var(--white);
  }
  .payroll-table .col-cell input.rate-input {
    width: 44px; padding: 4px 4px; border: 1px solid rgba(21,22,23,0.1); border-radius: 3px;
    font-family: Inter; font-size: 12px; text-align: center; color: rgba(21,22,23,0.7); background: rgba(0,0,0,0.02);
  }
  .payroll-table input:focus { outline: 2px solid var(--yellow); outline-offset: -2px; border-color: var(--yellow-deep); }
  .payroll-table .col-itog { background: rgba(254,214,52,0.15); font-weight: 600; }
  .payroll-table .col-total { background: var(--yellow); font-weight: 700; }
  .payroll-table tfoot td { background: var(--paper-warm); font-weight: 700; border-top: 2px solid var(--ink); }
  .payroll-table tfoot tr.paid-row td { background: var(--paper); font-weight: 500; }
  .payroll-table .pull-btn {
    background: transparent; border: 1px solid rgba(21,22,23,0.2); color: rgba(21,22,23,0.7);
    padding: 2px 6px; font-size: 11px; cursor: pointer; border-radius: 3px; margin-left: 6px;
  }
  .payroll-table .pull-btn:hover { background: var(--yellow); border-color: var(--yellow-deep); color: var(--ink); }
  .payroll-table .lock-btn {
    background: transparent; border: none; cursor: pointer; font-size: 12px; padding: 0 2px; line-height: 1;
    color: rgba(21,22,23,0.4);
  }
  .payroll-table .lock-btn.is-locked { color: var(--yellow-deep); }
  .payroll-table td.is-locked-cell { background: #FFF6D8; }
  .payroll-table .col-cell {
    position: relative; padding-top: 4px; padding-bottom: 4px;
  }
  .payroll-table .cell-row {
    display: flex; gap: 3px; align-items: center; justify-content: center;
  }

  /* Выплачено — зачёркивание */
  .payroll-table tr.is-paid-day td:not(.col-day):not(.col-paid) { text-decoration: line-through; color: rgba(21,22,23,0.45); }
  .payroll-table tr.is-paid-day td.col-day::after { content: ' ✓'; color: var(--moss); }
  .payroll-table td.col-teacher-paid { background: var(--paid-bg); }
  .payroll-table .paid-checkbox {
    cursor: pointer; transform: scale(1.15); accent-color: var(--moss);
  }

  /* ── Состояния загрузки ── */
  .loading, .empty { padding: 40px 20px; text-align: center; color: rgba(21,22,23,0.5); font-style: italic; }

  /* ── Модалка добавления педагога ── */
  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(21,22,23,0.55); z-index: 500;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal-box { background: var(--white); border-radius: 8px; padding: 20px; max-width: 480px; width: 100%; }
  .modal-title { font-weight: 700; font-size: 16px; margin-bottom: 12px; }
  .modal-box input[type=text] {
    width: 100%; padding: 8px 10px; font-size: 14px; border: 1px solid rgba(21,22,23,0.2); border-radius: 4px;
    font-family: Inter;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
  .pull-list { list-style: none; padding: 0; margin: 8px 0 0; max-height: 260px; overflow-y: auto; }
  .pull-list li {
    display: flex; align-items: center; gap: 8px; padding: 6px 4px; border-bottom: 1px solid rgba(21,22,23,0.08);
  }
  .pull-list label { font-size: 13px; cursor: pointer; flex: 1; }
  .pull-list .already { color: rgba(21,22,23,0.4); font-size: 12px; font-style: italic; }

  /* ── Тост ── */
  .toast {
    position: fixed; bottom: 20px; right: 20px; background: var(--ink); color: var(--white);
    padding: 10px 16px; border-radius: 4px; font-size: 13px; opacity: 0; pointer-events: none;
    transition: opacity 0.2s; z-index: 600;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 700px) {
    .top-bar { padding: 14px 14px 10px; }
    .title { font-size: 22px; }
    .wrap { padding: 4px 12px 30px; }
    .payroll-table .col-day { min-width: 90px; font-size: 12px; }
    .payroll-table th, .payroll-table td { padding: 3px 4px; }
    .payroll-table .col-meals input { width: 44px; }
    .payroll-table .col-cell input.cell-input { width: 40px; }
    .payroll-table .col-cell input.rate-input { width: 36px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-inner">
    <div>
      <div class="brand">Прознание · Coddy · Табель работы педагогов</div>
      <h1 class="title" id="title">Табель</h1>
      <div class="subhead" id="subhead"></div>
    </div>
    <div class="actions">
      <button onclick="clearCellsClick()" id="clear-cells-btn" title="Удалить все занятия и ставки. Список педагогов, питание и флаги выплат — останутся.">🧹 Очистить ячейки</button>
      <button onclick="clearAllClick()" id="clear-all-btn" title="Удалить весь табель этой смены (включая педагогов и флаги выплат). Безвозвратно.">🗑 Удалить весь табель</button>
      <button onclick="exportToExcel()" id="export-btn">📥 Экспорт в Excel</button>
    </div>
  </div>
</div>

<div class="statusbar">
  <span class="save-status" id="save-status"><span class="dot ok">●</span> сохранено</span>
  <span>Смена: <code id="season-id-display">—</code></span>
  <span id="totals-summary"></span>
</div>

<div class="wrap" id="wrap">
  <div class="card">
    <h3 class="card-title">Педагоги смены</h3>
    <div class="teachers-list" id="teachers-list"></div>
    <div class="teachers-actions">
      <button class="btn" onclick="openAddTeacherModal()">➕ Добавить педагога</button>
      <button class="btn" onclick="openPullTeachersModal()">🔄 Подтянуть из расписания</button>
    </div>
  </div>

  <div class="card">
    <h3 class="card-title">Журнал работы</h3>
    <div class="payroll-wrap">
      <div id="payroll-content" class="loading">Загружаю табель…</div>
    </div>
  </div>
</div>

<!-- Модалка: добавить педагога вручную -->
<div class="modal-bg" id="add-teacher-modal" onclick="if(event.target===this)closeAddTeacherModal()">
  <div class="modal-box">
    <div class="modal-title">Добавить педагога</div>
    <input type="text" id="new-teacher-name" placeholder="Фамилия (например, Иванова)" autocomplete="off">
    <div class="modal-actions">
      <button class="btn" onclick="closeAddTeacherModal()">Отмена</button>
      <button class="btn btn-primary" onclick="confirmAddTeacher()">Добавить</button>
    </div>
  </div>
</div>

<!-- Модалка: подтянуть педагогов из расписания -->
<div class="modal-bg" id="pull-teachers-modal" onclick="if(event.target===this)closePullTeachersModal()">
  <div class="modal-box">
    <div class="modal-title">Педагоги из расписания смены</div>
    <div id="pull-teachers-body" style="font-size:13px;color:rgba(21,22,23,0.7)">Загружаю…</div>
    <div class="modal-actions">
      <button class="btn" onclick="closePullTeachersModal()">Отмена</button>
      <button class="btn btn-primary" onclick="confirmPullTeachers()" id="confirm-pull-btn">Добавить выбранных</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const LIBRARY_URL = 'https://script.google.com/macros/s/AKfycbxb6EEzzl-FguxjpIO5YthGLj-QXh7puCD_DO4HL4wVPziHL1pEtVeuo3uNEi2i2yXq/exec';
  const MEALS_PRICE = 14; // ₽ за порцию (для умножения)
  const MONTHS = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
  const WEEKDAYS_SHORT = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

  let seasonId = '';
  let publishedState = null;     // расписание (для «Подтянуть из расписания»)
  let payroll = {                 // данные табеля с сервера
    teachers: [],
    cells: {},                    // 'YYYY-MM-DD::Имя' -> {lessons, rate, locked}
    meals: {},                    // 'YYYY-MM-DD' -> count
    paidDays: {},                 // 'YYYY-MM-DD' -> true
    paidTeachers: {}              // 'Имя' -> true
  };

  // ── УТИЛИТЫ ──
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, m =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]
    );
  }
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
  function dayKey(date) {
    // Date -> 'YYYY-MM-DD' в локальном поясе
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');
    return y + '-' + m + '-' + d;
  }
  function fmtDateLabel(date) {
    return date.getDate() + ' ' + MONTHS[date.getMonth()] + ' · ' + WEEKDAYS_SHORT[date.getDay()].toLowerCase();
  }
  function getShiftDays() {
    // Возвращает массив дней смены ([{date, key, label}]) из publishedState.
    if (!publishedState || !Array.isArray(publishedState.schedule)) return [];
    const start = new Date(publishedState.startDate || new Date());
    const out = [];
    for (let i = 0; i < publishedState.schedule.length; i++) {
      const d = new Date(start); d.setDate(start.getDate() + i);
      out.push({ date: d, key: dayKey(d), label: fmtDateLabel(d) });
    }
    return out;
  }

  // ── СТАТУС АВТОСОХРАНЕНИЯ ──
  function setSaveStatus(state, msg) {
    const el = document.getElementById('save-status');
    if (state === 'saving') {
      el.innerHTML = '<span class="dot saving">⏳</span> сохраняю…';
    } else if (state === 'err') {
      el.innerHTML = '<span class="dot err">●</span> ошибка: ' + escapeHtml(msg || '');
    } else {
      el.innerHTML = '<span class="dot ok">●</span> сохранено';
    }
  }

  // ── ЗАГРУЗКА ДАННЫХ ──
  async function init() {
    seasonId = (new URLSearchParams(location.search).get('id') || '').trim();
    if (!seasonId) {
      document.getElementById('payroll-content').innerHTML = '<div class="empty">Не передан id смены. Откройте табель из админки.</div>';
      return;
    }
    document.getElementById('season-id-display').textContent = seasonId;
    try {
      // Грузим параллельно: публикацию (для дней смены и расписания) и табель.
      const [pubResp, payrollResp] = await Promise.all([
        fetch(LIBRARY_URL + '?action=getPublished&id=' + encodeURIComponent(seasonId)).then(r => r.json()),
        fetch(LIBRARY_URL + '?action=getPayroll&seasonId=' + encodeURIComponent(seasonId)).then(r => r.json())
      ]);
      if (!pubResp.ok || !pubResp.publication) throw new Error(pubResp.error || 'Смена не найдена');
      publishedState = JSON.parse(pubResp.publication.stateJson || '{}');
      if (payrollResp.ok && payrollResp.payroll) payroll = payrollResp.payroll;
      renderHeader(pubResp.publication);
      render();
    } catch (e) {
      document.getElementById('payroll-content').innerHTML =
        '<div class="empty" style="color:var(--red)">Ошибка: ' + escapeHtml(e.message) + '</div>';
    }
  }

  function renderHeader(pub) {
    const theme = publishedState.theme || pub.theme || '';
    document.getElementById('title').innerHTML = theme ? ('Табель · <em>' + escapeHtml(theme) + '</em>') : 'Табель';
    const days = getShiftDays();
    if (days.length > 0) {
      const first = days[0].date, last = days[days.length-1].date;
      document.getElementById('subhead').textContent =
        first.getDate() + ' ' + MONTHS[first.getMonth()] + ' — ' +
        last.getDate() + ' ' + MONTHS[last.getMonth()] + ' · ' + days.length + ' дней';
    }
  }

  // ── РЕНДЕР ОСНОВНОЙ ТАБЛИЦЫ ──
  function render() {
    const days = getShiftDays();
    if (days.length === 0) {
      document.getElementById('payroll-content').innerHTML = '<div class="empty">У смены нет дней расписания.</div>';
      renderTeachersList();
      return;
    }
    renderTeachersList();
    renderTable(days);
    renderTotalsSummary(days);
  }

  function renderTeachersList() {
    const box = document.getElementById('teachers-list');
    if (!payroll.teachers.length) {
      box.innerHTML = '<div style="color:rgba(21,22,23,0.45);font-size:13px">Педагогов пока нет. Подтяни из расписания или добавь вручную.</div>';
      return;
    }
    box.innerHTML = payroll.teachers.map(t => {
      const paid = payroll.paidTeachers[t] ? '<span class="chip-paid">выплачено</span>' : '';
      return '<div class="teacher-chip">' +
        '<span class="chip-name">' + escapeHtml(t) + '</span>' + paid +
        '<button title="Удалить педагога" onclick="removeTeacher(\'' + escapeHtml(t).replace(/'/g,"\\'") + '\')">✕</button>' +
        '</div>';
    }).join('');
  }

  function renderTable(days) {
    const teachers = payroll.teachers;
    let html = '<table class="payroll-table"><thead>';
    // Шапка: 2 ряда (педагоги в верхнем ряду через colspan=3, в нижнем — занятий/ставка/итого)
    html += '<tr><th rowspan="2" class="col-day">Дата</th>' +
            '<th colspan="2">Питание</th>';
    teachers.forEach(t => {
      const paidCls = payroll.paidTeachers[t] ? ' col-teacher-paid' : '';
      html += '<th colspan="3" class="teacher-head' + paidCls + '">' + escapeHtml(t) + '</th>';
    });
    html += '<th rowspan="2">Итого день</th><th rowspan="2">Выпл.</th></tr>';

    html += '<tr><th>детей</th><th>× 14 ₽</th>';
    teachers.forEach(() => {
      html += '<th>занят.</th><th>ставка</th><th>итого</th>';
    });
    html += '</tr></thead><tbody>';

    days.forEach(d => {
      const isPaidDay = !!payroll.paidDays[d.key];
      const mealCount = payroll.meals[d.key];
      const mealSum = (mealCount != null && !isNaN(mealCount)) ? mealCount * MEALS_PRICE : 0;
      html += '<tr class="' + (isPaidDay ? 'is-paid-day' : '') + '">' +
        '<td class="col-day">' + escapeHtml(d.label) +
        ' <button class="pull-btn" onclick="pullDayFromSchedule(\'' + d.key + '\')" title="Подтянуть занятия педагогов из расписания этого дня">📥</button></td>' +
        '<td class="col-meals"><input type="number" min="0" data-meals-day="' + d.key + '" value="' + (mealCount != null ? mealCount : '') + '"></td>' +
        '<td>' + (mealCount != null ? mealSum + ' ₽' : '') + '</td>';
      let dayTotal = 0;
      teachers.forEach(t => {
        const cell = payroll.cells[d.key + '::' + t] || {};
        const locked = !!cell.locked;
        const teacherPaid = !!payroll.paidTeachers[t];
        const itog = (cell.lessons != null && cell.rate != null) ? cell.lessons * cell.rate : 0;
        if (itog) dayTotal += itog;
        const cellCls = (locked ? ' is-locked-cell' : '') + (teacherPaid ? ' col-teacher-paid' : '');
        html += '<td class="col-cell' + cellCls + '">' +
          '<div class="cell-row">' +
          '<input class="cell-input" type="number" min="0" data-day="' + d.key + '" data-teacher="' + escapeHtml(t).replace(/"/g,'&quot;') + '" data-field="lessons" value="' + (cell.lessons != null ? cell.lessons : '') + '">' +
          '<button class="lock-btn ' + (locked ? 'is-locked' : '') + '" data-day="' + d.key + '" data-teacher="' + escapeHtml(t).replace(/"/g,'&quot;') + '" title="' + (locked ? 'Закреплено — «Подтянуть» не перезапишет' : 'Закрепить ячейку') + '">' + (locked ? '🔒' : '🔓') + '</button>' +
          '</div>' +
          '</td>' +
          '<td class="col-cell' + cellCls + '"><input class="rate-input" type="number" min="0" data-day="' + d.key + '" data-teacher="' + escapeHtml(t).replace(/"/g,'&quot;') + '" data-field="rate" value="' + (cell.rate != null ? cell.rate : '') + '"></td>' +
          '<td class="col-itog' + (teacherPaid ? ' col-teacher-paid' : '') + '">' + (itog ? itog : '') + '</td>';
      });
      html += '<td class="col-total">' + (dayTotal || '') + '</td>' +
        '<td class="col-paid"><input type="checkbox" class="paid-checkbox" data-paid-day="' + d.key + '"' + (isPaidDay ? ' checked' : '') + '></td>' +
        '</tr>';
    });

    // ── ИТОГО ─
    html += '</tbody><tfoot>';
    // Сумма за смену
    let totalMeals = 0, totalAll = 0;
    days.forEach(d => {
      const m = payroll.meals[d.key];
      if (m != null && !isNaN(m)) totalMeals += m;
    });
    const teacherTotals = teachers.map(t => {
      let sum = 0;
      days.forEach(d => {
        const c = payroll.cells[d.key + '::' + t];
        if (c && c.lessons != null && c.rate != null) sum += c.lessons * c.rate;
      });
      totalAll += sum;
      return sum;
    });
    html += '<tr><td class="col-day">Итого ₽</td>' +
      '<td>' + totalMeals + '</td>' +
      '<td>' + (totalMeals * MEALS_PRICE) + ' ₽</td>';
    teachers.forEach((t, i) => {
      const paidCls = payroll.paidTeachers[t] ? ' col-teacher-paid' : '';
      const itog = teacherTotals[i];
      const txt = payroll.paidTeachers[t] ? '<s>' + itog + '</s>' : itog;
      html += '<td colspan="3" class="col-itog' + paidCls + '">' + (itog ? txt + ' ₽' : '') + '</td>';
    });
    html += '<td class="col-total">' + totalAll + ' ₽</td><td></td></tr>';

    // Галочки «выплачено педагогу за всю смену»
    html += '<tr class="paid-row"><td class="col-day">Выплачено педагогу</td><td colspan="2"></td>';
    teachers.forEach(t => {
      html += '<td colspan="3"><input type="checkbox" class="paid-checkbox" data-paid-teacher="' + escapeHtml(t).replace(/"/g,'&quot;') + '"' + (payroll.paidTeachers[t] ? ' checked' : '') + '></td>';
    });
    html += '<td colspan="2"></td></tr>';

    html += '</tfoot></table>';
    document.getElementById('payroll-content').className = '';
    document.getElementById('payroll-content').innerHTML = html;

    // Привязываем обработчики ввода
    document.querySelectorAll('input[data-meals-day]').forEach(inp => {
      inp.addEventListener('input', onMealsInput);
    });
    document.querySelectorAll('input[data-day][data-teacher][data-field]').forEach(inp => {
      inp.addEventListener('input', onCellInput);
    });
    document.querySelectorAll('.lock-btn[data-day][data-teacher]').forEach(btn => {
      btn.addEventListener('click', onLockClick);
    });
    document.querySelectorAll('input.paid-checkbox[data-paid-day]').forEach(cb => {
      cb.addEventListener('change', onPaidDayChange);
    });
    document.querySelectorAll('input.paid-checkbox[data-paid-teacher]').forEach(cb => {
      cb.addEventListener('change', onPaidTeacherChange);
    });
  }

  function renderTotalsSummary(days) {
    let totalAll = 0;
    payroll.teachers.forEach(t => {
      days.forEach(d => {
        const c = payroll.cells[d.key + '::' + t];
        if (c && c.lessons != null && c.rate != null) totalAll += c.lessons * c.rate;
      });
    });
    let totalMeals = 0;
    days.forEach(d => { const m = payroll.meals[d.key]; if (m != null) totalMeals += m; });
    document.getElementById('totals-summary').textContent =
      'Педагоги: ' + payroll.teachers.length + ' · ФОТ: ' + totalAll + ' ₽ · Питание: ' + (totalMeals * MEALS_PRICE) + ' ₽';
  }

  // ── АВТОСОХРАНЕНИЕ (debounce) ──
  const _saveQueue = {};
  function scheduleSave(key, fn) {
    if (_saveQueue[key]) clearTimeout(_saveQueue[key]);
    setSaveStatus('saving');
    _saveQueue[key] = setTimeout(async () => {
      try {
        await fn();
        setSaveStatus('ok');
      } catch (e) {
        setSaveStatus('err', e.message);
      }
    }, 600);
  }
  async function postAction(action, body) {
    const r = await fetch(LIBRARY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(Object.assign({ action: action }, body))
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || 'Ошибка сервера');
    return j;
  }

  // ── ОБРАБОТЧИКИ ──
  function onMealsInput(e) {
    const day = e.target.dataset.mealsDay;
    const raw = e.target.value.trim();
    const count = raw === '' ? null : Number(raw);
    if (count === null) delete payroll.meals[day]; else payroll.meals[day] = count;
    // Пересчёт ячейки × 14 ₽ и итогов
    const days = getShiftDays();
    renderTotalsSummary(days);
    // Обновим конкретную строку (соседнюю td с суммой)
    const tr = e.target.closest('tr');
    if (tr) {
      const sumTd = tr.querySelector('.col-meals + td');
      if (sumTd) sumTd.textContent = (count != null && !isNaN(count)) ? (count * MEALS_PRICE) + ' ₽' : '';
    }
    scheduleSave('meals::' + day, () => postAction('savePayrollMeals', { seasonId: seasonId, day: day, count: count }));
  }

  function onCellInput(e) {
    const day = e.target.dataset.day;
    const teacher = e.target.dataset.teacher;
    const field = e.target.dataset.field; // 'lessons' | 'rate'
    const raw = e.target.value.trim();
    const val = raw === '' ? null : Number(raw);
    const key = day + '::' + teacher;
    if (!payroll.cells[key]) payroll.cells[key] = { lessons: null, rate: null, locked: false };
    payroll.cells[key][field] = val;
    // Подсчитать итог ячейки
    const cell = payroll.cells[key];
    const itog = (cell.lessons != null && cell.rate != null) ? cell.lessons * cell.rate : 0;
    // Обновить визуально только колонку «итого» в строке
    const tr = e.target.closest('tr');
    if (tr) {
      const itogTds = tr.querySelectorAll('.col-itog');
      // Найти нужный td-итог: считаем индекс педагога
      const tIdx = payroll.teachers.indexOf(teacher);
      if (tIdx >= 0 && itogTds[tIdx]) itogTds[tIdx].textContent = itog ? itog : '';
      // Пересчёт итога дня
      let dayTotal = 0;
      payroll.teachers.forEach(t => {
        const c = payroll.cells[day + '::' + t];
        if (c && c.lessons != null && c.rate != null) dayTotal += c.lessons * c.rate;
      });
      const totalTd = tr.querySelector('.col-total');
      if (totalTd) totalTd.textContent = dayTotal || '';
    }
    renderTotalsSummary(getShiftDays());
    scheduleSave('cell::' + key, () => postAction('savePayrollCell', {
      seasonId: seasonId, day: day, teacher: teacher,
      lessons: cell.lessons, rate: cell.rate, locked: cell.locked
    }));
  }

  function onLockClick(e) {
    const btn = e.currentTarget;
    const day = btn.dataset.day;
    const teacher = btn.dataset.teacher;
    const key = day + '::' + teacher;
    if (!payroll.cells[key]) payroll.cells[key] = { lessons: null, rate: null, locked: false };
    payroll.cells[key].locked = !payroll.cells[key].locked;
    const cell = payroll.cells[key];
    // Если ячейка совсем пустая и сняли замок — удалим запись
    scheduleSave('cell::' + key, () => postAction('savePayrollCell', {
      seasonId: seasonId, day: day, teacher: teacher,
      lessons: cell.lessons, rate: cell.rate, locked: cell.locked
    }));
    render(); // перерисуем, чтобы обновить визуал замка и фон
  }

  // ── ПОДТЯНУТЬ ПЕДАГОГОВ ИЗ РАСПИСАНИЯ ──
  // Извлекаем имена педагогов из публикации (та же логика, что в view4: isNamedTeacher).
  function isNamedTeacher(name) {
    if (!name) return false;
    const n = String(name).trim().toLowerCase();
    if (!n) return false;
    if (n.includes('куратор') || n.includes('админ') || n.includes('вожат') || n.includes('тренер')) return false;
    if (n.includes(',')) return false;
    return /\s/.test(n.trim());
  }
  function normalizeTeacherName(s) {
    return String(s || '').trim().replace(/\s+/g, ' ');
  }

  // Возвращает { 'Имя педагога': {days: {dayKey: count}, total: N} } — где встречается в расписании.
  function scanScheduleTeachers() {
    const result = {};
    if (!publishedState || !Array.isArray(publishedState.schedule)) return result;
    const days = getShiftDays();
    publishedState.schedule.forEach((d, i) => {
      if (!d || !days[i]) return;
      const dk = days[i].key;
      const dayCounts = countTeachersInDay_(d);
      Object.keys(dayCounts).forEach(name => {
        if (!result[name]) result[name] = { days: {}, total: 0 };
        result[name].days[dk] = (result[name].days[dk] || 0) + dayCounts[name];
        result[name].total += dayCounts[name];
      });
    });
    return result;
  }

  // ── ПОДСЧЁТ ЗАНЯТИЙ В РАСПИСАНИИ ──
  // ЛОГИКА: «занятие» = одно проведённое занятие (педагог × группа отрядов).
  // По режимам половины дня:
  //   • normal — d[half] это 4 слота по отрядам. Каждый слот = 1 занятие (педагог × 1 отряд).
  //     Если в normal один педагог стоит в нескольких слотах — он провёл столько занятий.
  //   • rot4 — d[half+'Multi'].stations: 4 уникальные станции. Каждая станция = педагог,
  //     через которого ПРОХОДЯТ все 4 отряда по очереди. Итого: 1 станция × 4 отряда = 4 занятия.
  //   • seq3 — chainA для пары 1-2, chainB для пары 3-4. В каждой цепочке 3 МК:
  //     [0] и [1] — ротация ВНУТРИ пары: педагог ведёт МК × 2 отряда пары = 2 занятия.
  //     [2] — общий 3-й слот, оба отряда приходят к ОДНОМУ педагогу одновременно
  //     (в разных кабинетах с кураторами) = 2 занятия (по одной группе на отряд).
  //   • seq3trip — учащаяся пара (sg='A' = 1-2 или 'B' = 3-4) идёт по chainA или chainB
  //     как в seq3 (там реально используется chainA для обеих пар). Другая пара на выезде.
  //   • trip2/trip4/parallel/parallel2 — выезды, обычно ведут КУРАТОРЫ, в табель не идут.
  //
  // Возвращает объект { 'Имя педагога': число_занятий, ... }.
  function countTeachersInDay_(d) {
    const counts = {};
    function add(name, times) {
      if (!isNamedTeacher(name)) return;
      const n = normalizeTeacherName(name);
      counts[n] = (counts[n] || 0) + (times || 1);
    }
    if (!d) return counts;
    ['am', 'pm'].forEach(half => {
      const type = d[half + 'Type'] || 'normal';
      const multi = d[half + 'Multi'];
      if (type === 'rot4' && multi) {
        // Каждая станция: педагог × 4 отряда
        (multi.stations || []).forEach(s => { if (s) add(s.teacher, 4); });
      } else if (type === 'seq3' && multi) {
        // chainA (пара 1-2) и chainB (пара 3-4): МК [0],[1] — ротация × 2 отряда, [2] — общий × 2.
        // То есть каждое из 3 МК в цепочке = 2 занятия (педагог × 2 отряда пары).
        (multi.chainA || []).forEach(s => { if (s) add(s.teacher, 2); });
        (multi.chainB || []).forEach(s => { if (s) add(s.teacher, 2); });
      } else if (type === 'seq3trip' && multi) {
        // Учащаяся пара (sg='A' = 1-2, sg='B' = 3-4) идёт по chainA по той же логике seq3.
        // В этой версии данных используется только chainA — × 2 отряда пары.
        (multi.chainA || []).forEach(s => { if (s) add(s.teacher, 2); });
      } else {
        // normal и плоские режимы: каждый слот = 1 занятие. Если педагог стоит в N слотах —
        // он провёл N занятий за половину дня.
        const arr = d[half];
        if (Array.isArray(arr)) arr.forEach(s => { if (s) add(s.teacher, 1); });
      }
    });
    return counts;
  }
  // ── ПОДТЯНУТЬ ЗАНЯТИЯ ИЗ РАСПИСАНИЯ ЗА ДЕНЬ ──
  // Считает кол-во занятий каждого педагога по правилам countTeachersInDay_,
  // подставляет это число в ячейку (ставка по умолчанию 35), не трогает закреплённые.
  async function pullDayFromSchedule(dayKey) {
    const days = getShiftDays();
    const dIdx = days.findIndex(d => d.key === dayKey);
    if (dIdx < 0) return;
    const d = publishedState.schedule[dIdx];
    if (!d) return;
    const counts = countTeachersInDay_(d);
    // Добавим педагогов из расписания, которых ещё нет в списке (на всякий случай)
    const newTeachers = Object.keys(counts).filter(n => payroll.teachers.indexOf(n) < 0);
    for (const n of newTeachers) {
      await postAction('addPayrollTeacher', { seasonId: seasonId, teacher: n });
      payroll.teachers.push(n);
    }
    // Подставим в ячейки, не трогая закреплённые
    let touched = 0, skipped = 0;
    setSaveStatus('saving');
    for (const teacher of payroll.teachers) {
      const cnt = counts[teacher];
      if (cnt == null) continue; // педагог не вёл в этот день
      const key = dayKey + '::' + teacher;
      const cell = payroll.cells[key];
      if (cell && cell.locked) { skipped++; continue; }
      const newCell = {
        lessons: cnt,
        rate: (cell && cell.rate != null) ? cell.rate : 35,
        locked: false
      };
      payroll.cells[key] = newCell;
      await postAction('savePayrollCell', {
        seasonId: seasonId, day: dayKey, teacher: teacher,
        lessons: newCell.lessons, rate: newCell.rate, locked: false
      });
      touched++;
    }
    setSaveStatus('ok');
    toast('Подтянуто: ' + touched + (skipped ? ' (пропущено закреплённых: ' + skipped + ')' : ''));
    render();
  }
  window.pullDayFromSchedule = pullDayFromSchedule;

  // ── ЭКСПОРТ В EXCEL ──
  function exportToExcel() {
    if (typeof XLSX === 'undefined') { toast('Библиотека Excel не загружена'); return; }
    const days = getShiftDays();
    const teachers = payroll.teachers;
    // Шапка как в твоём Excel: A=Дата, B=Питание (детей), C=× 14 ₽, далее на каждого педагога 3 колонки
    const aoa = [];
    // Заголовок 1
    const row1 = ['', 'Питание', '', ''];
    teachers.forEach(t => { row1.push(t, '', ''); });
    row1.push('Итого день', 'Выпл.');
    aoa.push(row1);
    // Заголовок 2 (подколонки)
    const row2 = ['Дата', 'детей', '× 14 ₽', ''];
    teachers.forEach(() => { row2.push('занятий', 'ставка', 'итого'); });
    row2.push('', '');
    // (3-я ячейка после "× 14 ₽" зарезервирована для согласования с твоим Excel где есть колонка-разделитель)
    // Сократим: уберём лишнюю «пустую» колонку
    aoa[0] = ['Дата', 'Питание (детей)', '× 14 ₽'].concat(
      teachers.flatMap(t => [t, '', ''])
    ).concat(['Итого день', 'Выплачен?']);
    aoa.push(['', '', ''].concat(
      teachers.flatMap(() => ['занятий', 'ставка', 'итого'])
    ).concat(['', '']));

    // Данные по дням
    let totalAll = 0, totalMeals = 0;
    const teacherTotals = teachers.map(() => 0);
    days.forEach(d => {
      const meals = payroll.meals[d.key];
      if (meals != null) totalMeals += meals;
      const isPaid = !!payroll.paidDays[d.key];
      const row = [d.label, (meals != null ? meals : ''), (meals != null ? meals * MEALS_PRICE : '')];
      let dayTotal = 0;
      teachers.forEach((t, i) => {
        const c = payroll.cells[d.key + '::' + t] || {};
        const itog = (c.lessons != null && c.rate != null) ? c.lessons * c.rate : '';
        row.push(c.lessons != null ? c.lessons : '', c.rate != null ? c.rate : '', itog);
        if (typeof itog === 'number') { dayTotal += itog; teacherTotals[i] += itog; }
      });
      row.push(dayTotal || '', isPaid ? 'да' : '');
      totalAll += dayTotal;
      aoa.push(row);
    });
    // Итоги
    const totalRow = ['ИТОГО', totalMeals, totalMeals * MEALS_PRICE];
    teachers.forEach((_, i) => totalRow.push('', '', teacherTotals[i]));
    totalRow.push(totalAll, '');
    aoa.push(totalRow);
    // Выплачено педагогу
    const paidRow = ['Выпл. педагогу', '', ''];
    teachers.forEach(t => { paidRow.push('', '', payroll.paidTeachers[t] ? 'да' : ''); });
    paidRow.push('', '');
    aoa.push(paidRow);

    const ws = XLSX.utils.aoa_to_sheet(aoa);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Табель');
    const fname = 'tabel-' + seasonId + '.xlsx';
    XLSX.writeFile(wb, fname);
    toast('Скачано: ' + fname);
  }
  window.exportToExcel = exportToExcel;

  // ── ОЧИСТКА ──
  // «Очистить ячейки» — удаляет занятия/ставки/замки, но оставляет список педагогов,
  // питание и флаги выплат. Самый частый сценарий: «пересчитать с нуля через Подтянуть».
  async function clearCellsClick() {
    if (!seasonId) return;
    if (!confirm('Удалить ВСЕ занятия и ставки во всех ячейках?\n\n• Список педагогов — останется\n• Питание по дням — останется\n• Флаги «выплачено» — останутся\n\nЗамки игнорируются (закреплённые ячейки тоже очистятся).\n\nПродолжить?')) return;
    setSaveStatus('saving');
    try {
      const r = await postAction('clearPayrollCells', { seasonId: seasonId });
      payroll.cells = {};
      render();
      setSaveStatus('ok');
      toast('Очищено ячеек: ' + (r.result.removed || 0));
    } catch (e) { setSaveStatus('err', e.message); }
  }
  // «Удалить весь табель» — полная очистка: ячейки + педагоги + питание + флаги.
  // Двойное подтверждение (пользователь должен ввести «удалить»), чтобы случайно не нажать.
  async function clearAllClick() {
    if (!seasonId) return;
    const answer = prompt('УДАЛИТЬ ВЕСЬ ТАБЕЛЬ этой смены БЕЗВОЗВРАТНО?\n\nУдалится: список педагогов, все занятия и ставки, питание по дням, все галочки «выплачено».\n\nЧтобы подтвердить — введи слово «удалить» (без кавычек) и нажми OK.');
    if (!answer || answer.trim().toLowerCase() !== 'удалить') {
      if (answer !== null) toast('Отменено');
      return;
    }
    setSaveStatus('saving');
    try {
      const r = await postAction('clearPayrollAll', { seasonId: seasonId });
      payroll = { teachers: [], cells: {}, meals: {}, paidDays: {}, paidTeachers: {} };
      render();
      setSaveStatus('ok');
      toast('Табель удалён, записей удалено: ' + (r.result.removed || 0));
    } catch (e) { setSaveStatus('err', e.message); }
  }
  window.clearCellsClick = clearCellsClick;
  window.clearAllClick = clearAllClick;

  init();
</script>
</body>
</html>
