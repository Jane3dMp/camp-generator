<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Расписание (4 отряда) · Прознание</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow:      #FED634;
    --yellow-deep: #C9A800;
    --ink:         #151617;
    --paper:       #F5F5F0;
    --paper-warm:  #FFFBEC;
    --white:       #FFFFFF;
    --moss:        #6F8754;
    --terra:       #C77E5E;
    --terra-deep:  #9A4B30;
    /* Цвета отрядов — синхронно с index4.html */
    --troop-1: #41BEEA;
    --troop-2: #FF8A3D;
    --troop-3: #8FA370;
    --troop-4: #C879D8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    font-family: Inter, system-ui, -apple-system, sans-serif;
    color: var(--ink);
    line-height: 1.5;
  }

  /* === ЛОКСКРИН === */
  body:not(.unlocked) #app,
  body:not(.unlocked) #lock-logout-btn { display: none !important; }
  body.unlocked #lockscreen { display: none !important; }
  #lockscreen {
    position: fixed; inset: 0;
    background: var(--paper);
    z-index: 99999;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  #lockscreen .lock-card {
    background: var(--white);
    border: 1px solid var(--ink);
    padding: 32px 28px;
    max-width: 360px; width: 100%;
    box-shadow: 0 12px 40px rgba(21,22,23,0.08);
  }
  #lockscreen .lock-eyebrow {
    font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
    color: rgba(21,22,23,0.55); font-weight: 600; margin-bottom: 6px;
  }
  #lockscreen h1 { font-family: Geologica, system-ui, sans-serif; font-size: 24px; font-weight: 700; margin: 0 0 4px; }
  #lockscreen h1 em { font-family: Caveat, cursive; font-style: normal; font-weight: 600; background: var(--yellow); padding: 0 8px; border-radius: 4px; }
  #lockscreen .lock-sub { font-family: Geologica, serif; font-style: italic; font-size: 13px; color: rgba(21,22,23,0.6); margin: 0 0 18px; }
  #lockscreen input[type="password"] {
    font-size: 16px; border: 1px solid var(--ink); background: var(--white);
    padding: 12px 14px; color: var(--ink); outline: none; width: 100%;
    margin-bottom: 10px; letter-spacing: 0.05em; border-radius: 0; -webkit-appearance: none;
  }
  #lockscreen input[type="password"]:focus { border-color: var(--yellow-deep); }
  #lockscreen .lock-error { font-size: 12px; color: #c0392b; margin: -4px 0 10px; min-height: 14px; }
  #lockscreen .lock-btn {
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    border: 1px solid var(--ink); background: var(--yellow); color: var(--ink);
    padding: 12px 18px; cursor: pointer; font-weight: 700; width: 100%;
  }
  #lockscreen .lock-btn:hover { background: var(--yellow-deep); }
  #lock-logout-btn {
    position: fixed; bottom: 12px; left: 12px; z-index: 9998;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    border: 1px solid rgba(21,22,23,0.25); background: rgba(255,255,255,0.85);
    color: rgba(21,22,23,0.55); padding: 6px 10px; cursor: pointer;
    font-weight: 500; border-radius: 3px; backdrop-filter: blur(4px);
  }
  #lock-logout-btn:hover { background: var(--ink); color: var(--paper); }

  /* === ОСНОВНОЕ === */
  #app { max-width: 920px; margin: 0 auto; padding: 24px 18px 80px; }
  .view-header { text-align: center; margin-bottom: 24px; }
  .view-eyebrow { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(21,22,23,0.55); font-weight: 600; margin-bottom: 4px; }
  .view-header h1 { font-family: Geologica, sans-serif; font-size: 26px; font-weight: 700; margin: 0; line-height: 1.15; }
  .view-header h1 em { font-family: Caveat, cursive; font-style: normal; font-weight: 600; background: var(--yellow); padding: 0 6px; border-radius: 4px; }
  .view-subhead { font-family: Geologica, serif; font-style: italic; font-size: 13px; color: rgba(21,22,23,0.65); margin-top: 4px; }

  .view-controls {
    background: var(--paper-warm); border: 1px solid var(--ink);
    padding: 14px 16px; margin-bottom: 18px;
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }
  .view-controls label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(21,22,23,0.55); font-weight: 600; }
  .view-controls select {
    font-size: 14px; border: 1px solid var(--ink); background: var(--white);
    padding: 7px 10px; color: var(--ink); outline: none; min-width: 160px; flex: 1;
    border-radius: 0; -webkit-appearance: none;
  }
  .view-refresh {
    border: 1px solid var(--ink); background: var(--white); padding: 7px 12px;
    cursor: pointer; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 600; color: var(--ink); font-family: Inter, sans-serif;
  }
  .view-refresh:hover { background: var(--yellow); }
  .view-loading, .view-error {
    text-align: center; padding: 40px 20px;
    font-family: Geologica, serif; font-style: italic; color: rgba(21,22,23,0.55);
  }
  .view-error { color: var(--terra-deep); }

  .vday { background: var(--white); border: 1px solid var(--ink); margin-bottom: 12px; overflow: hidden; }
  .vday-head {
    background: var(--ink); color: var(--paper); padding: 10px 14px;
    display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 6px;
  }
  .vday-num { font-family: Geologica, sans-serif; font-size: 16px; font-weight: 700; color: var(--yellow); }
  .vday-meta { font-family: Caveat, cursive; font-size: 16px; color: var(--white); font-weight: 600; }
  .vday-body { padding: 10px 14px; }
  .vday-rest { font-family: Geologica, serif; font-style: italic; color: rgba(21,22,23,0.4); font-size: 13px; padding: 6px 0; }

  /* Заголовок блока (завтрак/обед/время) */
  .vmeal {
    font-family: Inter, sans-serif; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(21,22,23,0.55); font-weight: 600;
    padding: 6px 0; border-bottom: 1px dashed rgba(21,22,23,0.12); margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .vmeal .vmeal-time { font-family: Geologica, serif; font-style: italic; text-transform: none; letter-spacing: 0; color: var(--yellow-deep); font-size: 13px; }

  .vslot { padding: 8px 0; border-bottom: 1px dotted rgba(21,22,23,0.12); }
  .vslot:last-child { border-bottom: none; }
  .vslot-row { display: grid; grid-template-columns: 100px 1fr; gap: 12px; align-items: baseline; }
  .vslot-time { font-size: 12px; font-weight: 600; color: var(--ink); }
  .vslot.is-trip .vslot-time { color: var(--yellow-deep); }
  .vslot-name { font-family: Geologica, sans-serif; font-size: 14px; font-weight: 500; line-height: 1.25; }
  .vslot-trip-badge {
    display: inline-block; background: var(--yellow); color: var(--ink);
    font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 2px; margin-right: 6px;
    text-transform: uppercase; letter-spacing: 0.05em; vertical-align: middle;
  }
  .vslot-scored-badge {
    display: inline-block; background: #8FA370; color: #fff;
    font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 2px; margin-right: 6px;
    text-transform: uppercase; letter-spacing: 0.05em; vertical-align: middle;
  }
  .vslot.is-scored { background: rgba(143,163,112,0.07); border-radius: 6px; padding-left: 8px; padding-right: 8px; }
  .vslot-scored-btn {
    display: inline-block; margin-top: 8px; background: #8FA370; color: #fff;
    font-size: 13px; font-weight: 600; padding: 7px 14px; border-radius: 9px;
    text-decoration: none; transition: background 0.15s;
  }
  .vslot-scored-btn:hover { background: #6f8052; }
  .vslot-btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .vslot-btn-row .vslot-scored-btn { margin-top: 0; }
  .vslot-lesson-btn {
    display: inline-block; background: #C8714B; color: #fff; border: none; cursor: pointer;
    font-family: Inter, sans-serif; font-size: 13px; font-weight: 600; padding: 7px 14px;
    border-radius: 9px; transition: background 0.15s;
  }
  .vslot-lesson-btn:hover { background: #a9572f; }
  .ln-badge {
    display: inline-flex; align-items: center; font-family: Inter, sans-serif;
    font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 8px; align-self: center;
  }
  .ln-badge.saved { background: rgba(143,163,112,0.18); color: #5e7042; }
  .ln-badge.sent  { background: rgba(115,96,242,0.16); color: #5b49d6; }

  .ln-overlay {
    position: fixed; inset: 0; background: rgba(21,22,23,0.55); z-index: 9999;
    display: none; align-items: flex-start; justify-content: center; padding: 16px; overflow-y: auto;
  }
  .ln-overlay.open { display: flex; }
  .ln-modal {
    background: var(--white, #fff); width: 100%; max-width: 520px; margin-top: 24px;
    border-radius: 16px; padding: 20px; box-shadow: 0 18px 50px rgba(0,0,0,0.3);
    font-family: Inter, sans-serif; color: var(--ink, #151617);
  }
  .ln-title { font-size: 17px; font-weight: 700; margin: 0 0 2px; }
  .ln-sub { font-size: 12px; color: rgba(21,22,23,0.6); margin: 0 0 14px; }
  .ln-rec-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .ln-rec-btn {
    border: none; cursor: pointer; width: 56px; height: 56px; border-radius: 50%;
    background: #C8714B; color: #fff; font-size: 22px; flex: none; transition: background 0.15s;
  }
  .ln-rec-btn.recording { background: #c0392b; animation: ln-pulse 1.2s infinite; }
  @keyframes ln-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.5);} 50% { box-shadow: 0 0 0 10px rgba(192,57,43,0);} }
  .ln-timer { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .ln-hint { font-size: 12px; color: rgba(21,22,23,0.6); }
  .ln-status { font-size: 13px; margin: 10px 0; min-height: 18px; color: var(--ink); }
  .ln-status.err { color: #c0392b; }
  .ln-label { font-size: 12px; font-weight: 600; margin: 12px 0 4px; }
  .ln-textarea {
    width: 100%; box-sizing: border-box; min-height: 120px; padding: 10px;
    border: 1.5px solid rgba(21,22,23,0.18); border-radius: 10px; font-family: Inter, sans-serif;
    font-size: 14px; line-height: 1.5; resize: vertical;
  }
  .ln-raw { font-size: 12px; color: rgba(21,22,23,0.55); white-space: pre-wrap;
    background: rgba(21,22,23,0.04); border-radius: 8px; padding: 8px 10px; margin-top: 6px; display: none; }
  .ln-raw.open { display: block; }
  .ln-toggle-raw { background: none; border: none; color: #C8714B; cursor: pointer; font-size: 12px; padding: 4px 0; }
  .ln-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .ln-btn { border: none; cursor: pointer; font-family: Inter, sans-serif; font-size: 13px;
    font-weight: 600; padding: 9px 16px; border-radius: 9px; }
  .ln-btn.primary { background: #8FA370; color: #fff; }
  .ln-btn.primary:hover { background: #6f8052; }
  .ln-btn.viber { background: #7360f2; color: #fff; }
  .ln-btn.viber:hover { background: #5b49d6; }
  .ln-btn.ghost { background: rgba(21,22,23,0.07); color: var(--ink); }
  .ln-btn.ghost:hover { background: rgba(21,22,23,0.13); }
  .ln-btn:disabled { opacity: 0.5; cursor: default; }
  .ln-close { float: right; background: none; border: none; font-size: 22px; cursor: pointer; color: rgba(21,22,23,0.5); line-height: 1; }
  .vslot-theme { font-family: Caveat, cursive; font-size: 16px; color: var(--yellow-deep); font-weight: 600; line-height: 1.1; margin-top: 2px; }
  .vslot-comment {
    font-family: Inter, sans-serif; font-size: 12px; color: var(--ink);
    background: rgba(254,214,52,0.22); border-left: 3px solid var(--yellow-deep);
    padding: 5px 9px; margin-top: 6px; line-height: 1.4; border-radius: 0 3px 3px 0; white-space: pre-wrap;
  }
  .vslot-meta { font-size: 11px; color: rgba(21,22,23,0.65); margin-top: 4px; }
  .pill-troop {
    color: var(--ink); padding: 1px 6px; font-weight: 700; border-radius: 2px;
    margin-right: 4px; font-size: 10px;
  }
  .pill-troop.t1 { background: var(--troop-1); color: var(--white); }
  .pill-troop.t2 { background: var(--troop-2); color: var(--white); }
  .pill-troop.t3 { background: var(--troop-3); color: var(--white); }
  .pill-troop.t4 { background: var(--troop-4); color: var(--white); }

  .vslot-refs-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .vslot-refs-grid a {
    border: 1px solid rgba(21,22,23,0.15); border-radius: 3px; overflow: hidden;
    display: block; background: rgba(21,22,23,0.04); text-decoration: none; color: var(--ink);
  }
  .vslot-refs-grid a:hover { box-shadow: 0 4px 12px rgba(21,22,23,0.15); }
  .vslot-refs-img { width: 80px; height: 56px; object-fit: cover; display: block; }

  .view-published-at { font-family: Geologica, serif; font-style: italic; font-size: 11px; color: rgba(21,22,23,0.5); text-align: center; margin-top: 14px; }

  /* === МОБИЛЬНАЯ === */
  @media (max-width: 720px) {
    #app { padding: 18px 14px 60px; }
    .view-header h1 { font-size: 24px; }
  }
  @media (max-width: 560px) {
    #app { padding: 14px 10px 70px; }
    .view-header { margin-bottom: 18px; }
    .view-header h1 { font-size: 22px; }
    .view-eyebrow { font-size: 10px; letter-spacing: 0.18em; }
    .view-subhead { font-size: 12px; }
    .view-controls { flex-direction: column; align-items: stretch; gap: 8px; padding: 12px; }
    .view-controls select { width: 100%; min-width: 0; font-size: 16px; padding: 10px 12px; }
    .view-refresh { width: 100%; padding: 10px 14px; font-size: 12px; }
    .vday-head { padding: 10px 12px; }
    .vday-num { font-size: 15px; }
    .vday-meta { font-size: 15px; }
    .vday-body { padding: 10px 12px; }
    .vslot { padding: 10px 0; }
    .vslot-row { display: block; }
    .vslot-time {
      display: inline-block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      background: rgba(21,22,23,0.05); padding: 2px 6px; border-radius: 2px; margin-bottom: 6px; color: rgba(21,22,23,0.65);
    }
    .vslot-name { font-size: 15px; }
    .vslot-theme { font-size: 18px; }
    .vslot-meta { font-size: 12px; }
    .vslot-refs-grid { gap: 8px; }
    .vslot-refs-img { width: 96px; height: 96px; object-fit: contain; background: var(--white); }
    #lockscreen { padding: 24px 14px; }
    .lock-card { padding: 28px 22px; }
    #lock-logout-btn { bottom: 10px; left: 10px; padding: 8px 12px; font-size: 11px; }
  }
  @media (max-width: 380px) {
    .view-header h1 { font-size: 20px; }
    .vslot-refs-img { width: 80px; height: 80px; }
    .vday-head { flex-direction: column; align-items: flex-start; gap: 4px; }
  }

  /* ── ПОПАП «СОСТАВ ОТРЯДОВ» (педагог) ── */
  .roster-popup {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(21,22,23,0.55); padding: 20px;
    align-items: flex-start; justify-content: center; overflow-y: auto;
  }
  .roster-popup.open { display: flex; }
  .roster-popup-box {
    background: var(--white); border-radius: 10px; max-width: 920px; width: 100%;
    margin: 0 auto; padding: 22px; box-shadow: 0 18px 60px rgba(0,0,0,0.3);
  }
  .roster-popup-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .roster-popup-title { font-family: Inter, sans-serif; font-weight: 700; font-size: 18px; }
  .roster-popup-close {
    background: none; border: none; font-size: 22px; cursor: pointer; color: rgba(21,22,23,0.5);
    line-height: 1; padding: 0 4px;
  }
  .roster-popup-close:hover { color: var(--ink); }
  .roster-popup-empty { font-family: Inter, sans-serif; color: rgba(21,22,23,0.5); padding: 12px 0; }
  .roster-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
  }
  .roster-tile { border: 1px solid rgba(21,22,23,0.12); border-radius: 8px; padding: 12px 14px; border-top: 4px solid var(--ink); }
  .roster-tile.roster-t1 { border-top-color: var(--troop-1); }
  .roster-tile.roster-t2 { border-top-color: var(--troop-2); }
  .roster-tile.roster-t3 { border-top-color: var(--troop-3); }
  .roster-tile.roster-t4 { border-top-color: var(--troop-4); }
  .roster-tile-head {
    font-family: Inter, sans-serif; font-weight: 700; font-size: 14px; margin-bottom: 8px;
    display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
  }
  .roster-tile-head .rc-count { font-weight: 400; font-size: 12px; color: rgba(21,22,23,0.5); }
  .roster-tile-list {
    list-style: none; margin: 0; padding: 0; font-family: Inter, sans-serif; font-size: 13.5px;
  }
  .roster-tile-list li {
    padding: 4px 0; border-bottom: 1px solid rgba(21,22,23,0.06);
    display: flex; align-items: baseline; gap: 8px;
  }
  .roster-tile-list li:last-child { border-bottom: none; }
  .roster-tile-list .rc-num { color: rgba(21,22,23,0.4); min-width: 18px; text-align: right; font-size: 12px; }
  .roster-tile-list .rc-age { margin-left: auto; color: rgba(21,22,23,0.5); font-size: 12px; white-space: nowrap; }
  .roster-tile-list .rc-empty { color: rgba(21,22,23,0.4); font-style: italic; }
  @media (max-width: 640px) {
    .roster-grid { grid-template-columns: 1fr; }
    .roster-popup { padding: 10px; }
    .roster-popup-box { padding: 16px; }
  }
</style>
</head>
<body>

<div id="lockscreen">
  <div class="lock-card">
    <div class="lock-eyebrow">Прознание · Coddy</div>
    <h1>Расписание <em>смены</em></h1>
    <p class="lock-sub">Введи пароль для просмотра. Запомнится в браузере.</p>
    <input type="password" id="lock-password-input" placeholder="••••••••" autofocus
           onkeydown="if(event.key==='Enter') tryUnlock()">
    <div class="lock-error" id="lock-error"></div>
    <button class="lock-btn" onclick="tryUnlock()">Войти</button>
  </div>
</div>
<button id="lock-logout-btn" onclick="lockLogout()">🔓 Выйти</button>

<div id="app">
  <div class="view-header">
    <div class="view-eyebrow">Прознание · Coddy · смена на 4 отряда</div>
    <h1 id="view-title">Расписание <em>смены</em></h1>
    <div class="view-subhead" id="view-subhead"></div>
  </div>

  <div class="view-controls" id="view-controls" style="display:none">
    <label for="teacher-pick">Педагог:</label>
    <select id="teacher-pick" onchange="onTeacherChange()">
      <option value="__all__">— выбери себя —</option>
    </select>
    <button class="view-refresh" onclick="reloadFromServer()" title="Обновить — взять последнюю опубликованную версию">↻</button>
    <button class="view-refresh" onclick="openRosterPopup()" title="Показать состав всех отрядов">👦 состав</button>
  </div>

  <div id="view-content">
    <div class="view-loading">Загружаю расписание…</div>
  </div>

  <div class="view-published-at" id="view-published-at"></div>

  <div class="roster-popup" id="roster-popup" onclick="if(event.target===this)closeRosterPopup()">
    <div class="roster-popup-box">
      <div class="roster-popup-head">
        <span class="roster-popup-title">Состав отрядов</span>
        <button class="roster-popup-close" onclick="closeRosterPopup()" title="Закрыть">✕</button>
      </div>
      <div class="roster-grid" id="roster-grid"></div>
      <div class="roster-popup-empty" id="roster-popup-empty" style="display:none">Список детей не загружен.</div>
    </div>
  </div>
</div>

<script>
  const LIBRARY_URL = 'https://script.google.com/macros/s/AKfycbxb6EEzzl-FguxjpIO5YthGLj-QXh7puCD_DO4HL4wVPziHL1pEtVeuo3uNEi2i2yXq/exec';
  const LOCK_PASSWORD_HASH = '45e5a3f82cc81679d006c8d2f6e3cce87c89ec2059fe13a2d79438f0368b226a';
  const LOCK_TOKEN_KEY = 'camp_lock_token_v1';
  const MONTHS = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
  const WEEKDAYS = ['вс','пн','вт','ср','чт','пт','сб'];
  const NUM_TROOPS = 4;
  let troopsChildren = [];   // [{crmId, name, age, troop, ...}] — для попапа «состав»
  const TIME_AM = '9:30 – 13:30';
  const TIME_PM = '14:00 – 17:30';
  const BREAKFAST = { name: 'Завтрак', time: '9:00 – 9:30' };
  const LUNCH     = { name: 'Обед',    time: '13:30 – 14:00' };

  // === ЛОКСКРИН ===
  async function sha256Hex(text) {
    const enc = new TextEncoder().encode(text);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }
  async function tryUnlock() {
    const inputEl = document.getElementById('lock-password-input');
    const errEl = document.getElementById('lock-error');
    const pwd = (inputEl.value || '').trim();
    errEl.textContent = '';
    if (!pwd) { errEl.textContent = 'Введи пароль'; return; }
    try {
      const hex = await sha256Hex(pwd);
      if (hex === LOCK_PASSWORD_HASH) {
        localStorage.setItem(LOCK_TOKEN_KEY, hex);
        document.body.classList.add('unlocked');
        bootstrap();
      } else {
        errEl.textContent = 'Неверный пароль';
        inputEl.value = ''; inputEl.focus();
      }
    } catch(e) { errEl.textContent = 'Ошибка: ' + e.message; }
  }
  function lockLogout() {
    if (!confirm('Выйти? Пароль будет забыт на этом устройстве.')) return;
    localStorage.removeItem(LOCK_TOKEN_KEY);
    location.reload();
  }
  (function checkLockOnLoad() {
    try {
      const tok = localStorage.getItem(LOCK_TOKEN_KEY);
      if (tok && tok === LOCK_PASSWORD_HASH) {
        document.body.classList.add('unlocked');
        bootstrap();
      }
    } catch(e) {}
  })();

  // === ДАННЫЕ ===
  let publishedState = null;
  let publishedMeta = null;
  let LIBRARY = [];

  // Кэш серверных превью: запрашиваем у Apps Script og:image / Pinterest oembed для ссылок,
  // у которых нет прямой картинки (страницы pinterest.com, pin.it, chatgpt.com и т.п.).
  // Сервер сам кэширует на 24 часа, мы — на всю сессию страницы.
  const refPreviewCache = {};
  const refPreviewInFlight = {};
  function fetchServerPreview(url) {
    if (refPreviewCache[url] !== undefined) return Promise.resolve(refPreviewCache[url]);
    if (refPreviewInFlight[url]) return refPreviewInFlight[url];
    const p = fetch(LIBRARY_URL + '?action=previewUrl&url=' + encodeURIComponent(url))
      .then(r => r.json())
      .then(data => {
        const thumb = (data && data.ok && data.preview && data.preview.thumbnail) ? data.preview.thumbnail : '';
        refPreviewCache[url] = thumb;
        delete refPreviewInFlight[url];
        return thumb;
      })
      .catch(() => { refPreviewCache[url] = ''; delete refPreviewInFlight[url]; return ''; });
    refPreviewInFlight[url] = p;
    return p;
  }
  // Запустить фоновую подгрузку для всех <a data-ref-url> в документе.
  function hydrateAllRefPreviews() {
    document.querySelectorAll('a[data-ref-url]').forEach(a => {
      const url = a.getAttribute('data-ref-url');
      if (!url) return;
      fetchServerPreview(url).then(thumb => {
        if (!thumb || !a.isConnected) return;
        // Заменяем содержимое ссылки на <img>
        const img = document.createElement('img');
        img.className = 'vslot-refs-img';
        img.src = thumb;
        img.alt = '';
        img.onerror = () => { a.style.display = 'none'; };
        a.innerHTML = '';
        a.appendChild(img);
        a.removeAttribute('style');
        a.removeAttribute('data-ref-url');
      });
    });
  }

  function getQueryParam(name) {
    const m = new RegExp('[?&]' + name + '=([^&#]*)').exec(window.location.search);
    return m ? decodeURIComponent(m[1]) : '';
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function normalizeName(s) {
    if (!s) return '';
    return String(s).toLowerCase().replace(/ё/g, 'е').replace(/\s+/g, ' ').trim();
  }
  // Дата N-го рабочего дня (выходные пропускаем).
  function dateForDay(state, dayIdx) {
    const start = new Date(state.startDate + 'T00:00:00');
    let d = new Date(start);
    let workDays = 0;
    while (workDays < dayIdx + 1) {
      if (d.getDay() !== 0 && d.getDay() !== 6) workDays++;
      if (workDays < dayIdx + 1) d.setDate(d.getDate() + 1);
      else break;
    }
    return d;
  }

  async function bootstrap() {
    const id = getQueryParam('id');
    if (!id) {
      document.getElementById('view-content').innerHTML =
        '<div class="view-error">В ссылке не указан ID публикации. Попроси у администратора актуальную ссылку.</div>';
      return;
    }
    await loadAll(id);
    const teacherFromUrl = getQueryParam('teacher');
    if (teacherFromUrl) {
      const sel = document.getElementById('teacher-pick');
      const opt = Array.from(sel.options).find(o => o.value.toLowerCase() === teacherFromUrl.toLowerCase());
      if (opt) { sel.value = opt.value; renderForCurrentTeacher(); }
    }
  }

  async function reloadFromServer() {
    const id = getQueryParam('id');
    if (!id) return;
    // Берём только первую .view-refresh (саму кнопку перезагрузки, не «печать»)
    const btn = document.querySelector('.view-controls .view-refresh');
    if (btn) { btn.disabled = true; btn.textContent = '…'; }
    try { await loadAll(id); }
    finally { if (btn) { btn.disabled = false; btn.textContent = '↻'; } }
  }
  function openPrintVersion() {
    const id = getQueryParam('id');
    if (!id) return;
    window.open('print4.html?id=' + encodeURIComponent(id), '_blank');
  }
  window.openPrintVersion = openPrintVersion;

  // ── ПОПАП «СОСТАВ ОТРЯДОВ» (для педагога) ──
  // Все 4 отряда плиткой, только ФИО и возраст (без телефонов).
  function dobSortKey4_(dob) {
    const m = String(dob || '').trim().match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
    if (!m) return 0;
    return new Date(+m[3], +m[2] - 1, +m[1]).getTime();
  }
  function pluralKids_(n) {
    const m10 = n % 10, m100 = n % 100;
    if (m10 === 1 && m100 !== 11) return 'ребёнок';
    if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return 'ребёнка';
    return 'детей';
  }
  function openRosterPopup() {
    const grid = document.getElementById('roster-grid');
    const empty = document.getElementById('roster-popup-empty');
    if (!troopsChildren || troopsChildren.length === 0) {
      grid.innerHTML = '';
      empty.style.display = '';
    } else {
      empty.style.display = 'none';
      let html = '';
      for (let t = 1; t <= NUM_TROOPS; t++) {
        const kids = troopsChildren
          .filter(k => Number(k.troop) === t)
          .sort((a, b) => dobSortKey4_(b.dob) - dobSortKey4_(a.dob));
        const labels = ['младшие', '', '', 'старшие'];
        const sub = labels[t - 1] ? ' · ' + labels[t - 1] : '';
        let items = kids.length
          ? kids.map((k, i) => {
              const age = (k.age === '' || k.age == null) ? '' : '<span class="rc-age">' + k.age + '</span>';
              return '<li><span class="rc-num">' + (i + 1) + '</span>' + escapeHtml(k.name) + age + '</li>';
            }).join('')
          : '<li class="rc-empty">пусто</li>';
        html += '<div class="roster-tile roster-t' + t + '">' +
          '<div class="roster-tile-head">Отряд ' + t + sub +
            ' <span class="rc-count">' + kids.length + ' ' + pluralKids_(kids.length) + '</span></div>' +
          '<ol class="roster-tile-list">' + items + '</ol>' +
          '</div>';
      }
      grid.innerHTML = html;
    }
    document.getElementById('roster-popup').classList.add('open');
  }
  function closeRosterPopup() {
    document.getElementById('roster-popup').classList.remove('open');
  }
  window.openRosterPopup = openRosterPopup;
  window.closeRosterPopup = closeRosterPopup;

  async function loadAll(id) {
    document.getElementById('view-content').innerHTML = '<div class="view-loading">Загружаю расписание…</div>';
    try {
      const [pubResp, libResp] = await Promise.all([
        fetch(LIBRARY_URL + '?action=getPublished&id=' + encodeURIComponent(id)).then(r => r.json()),
        fetch(LIBRARY_URL + '?action=library').then(r => r.json()).catch(() => ({ ok: false }))
      ]);
      if (!pubResp.ok) throw new Error(pubResp.error || 'Не удалось загрузить публикацию');
      LIBRARY = (libResp && libResp.ok && libResp.activities) ? libResp.activities : [];
      // Подтягиваем состав отрядов (для попапа «состав»). Не критично для расписания.
      fetch(LIBRARY_URL + '?action=getChildren&seasonId=' + encodeURIComponent(id))
        .then(r => r.json())
        .then(d => { if (d && d.ok && Array.isArray(d.children)) troopsChildren = d.children; })
        .catch(() => {});
      const pub = pubResp.publication;
      if (!pub) throw new Error('Публикация с этим id не найдена. Возможно, ссылка устарела.');
      if (!pub.id) throw new Error('Сервер вернул некорректную публикацию (нет id).');
      publishedMeta = { id: pub.id, name: pub.name || '', theme: pub.theme || '', publishedAt: pub.publishedAt || '' };
      try { publishedState = JSON.parse(pub.stateJson || '{}'); }
      catch(e) { throw new Error('Не удалось распарсить расписание: ' + e.message); }
      // Проверка формы: 4-отрядная публикация должна иметь am/pm массивы.
      if (!Array.isArray(publishedState.schedule) || publishedState.schedule.length === 0
          || !publishedState.schedule[0] || !Array.isArray(publishedState.schedule[0].am)) {
        throw new Error('Это не похоже на смену на 4 отряда. Для 6-отрядных смен используй view.html.');
      }
      onPublishedLoaded();
    } catch(e) {
      document.getElementById('view-content').innerHTML = '<div class="view-error">Ошибка: ' + escapeHtml(e.message) + '</div>';
    }
  }

  function onPublishedLoaded() {
    document.getElementById('view-controls').style.display = '';
    if (publishedState.theme) {
      document.getElementById('view-title').innerHTML = 'Смена <em>' + escapeHtml(publishedState.theme) + '</em>';
    }
    document.getElementById('view-subhead').textContent = publishedMeta.name || ('смена «' + (publishedState.theme || '') + '»');
    if (publishedMeta.publishedAt) {
      const d = new Date(publishedMeta.publishedAt);
      document.getElementById('view-published-at').textContent =
        'Опубликовано ' + d.toLocaleString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    }
    populateTeacherSelect();
    renderForCurrentTeacher();
  }

  // Именованный педагог: есть пробел (Фамилия Имя), не куратор/админ/тренер, без запятых.
  function isNamedTeacher(name) {
    if (!name) return false;
    const n = String(name).trim().toLowerCase();
    if (!n) return false;
    if (n.includes('куратор') || n.includes('админ') || n.includes('вожат') || n.includes('тренер')) return false;
    if (n.includes(',')) return false;
    return /\s/.test(n.trim());
  }

  // Все именованные педагоги из расписания (am/pm × 4 отряда), без дублей.
  function getNamedTeachers() {
    const seen = new Set();
    const result = [];
    const tryAdd = (t) => {
      if (!isNamedTeacher(t)) return;
      const norm = normalizeName(t);
      if (seen.has(norm)) return;
      seen.add(norm);
      result.push(t);
    };
    if (!publishedState || !Array.isArray(publishedState.schedule)) return [];
    publishedState.schedule.forEach(d => {
      if (!d) return;
      ['am','pm'].forEach(half => {
        const mode = halfMode4(d, half);
        if (mode === 'seq3' || mode === 'rot4') {
          const multi = d[half + 'Multi'];
          if (!multi) return;
          ['chainA','chainB','stations'].forEach(sub => {
            (multi[sub] || []).forEach(s => { if (s) tryAdd(String(s.teacher || '').trim()); });
          });
          return;
        }
        if (mode === 'seq3trip') {
          const multi = d[half + 'Multi'];
          if (!multi) return;
          (multi.chainA || []).forEach(s => { if (s) tryAdd(String(s.teacher || '').trim()); });
          // Слот выезда: am[2] если учится A, am[0] если учится B
          const tripIdx = (multi.studyGroup === 'B') ? 0 : 2;
          const tripSlot = (d[half] || [])[tripIdx];
          if (tripSlot) tryAdd(String(tripSlot.teacher || '').trim());
          return;
        }
        const arr = d[half];
        if (!Array.isArray(arr)) return;
        // Только активные слоты по типу дня — чтобы «призраки» из мусорных
        // слотов выездных раскладок не попадали в список.
        activeSlotsForHalf(d, half).forEach(a => {
          const s = arr[a.idx];
          if (s) tryAdd(String(s.teacher || '').trim());
        });
      });
    });
    return result.sort((a, b) => a.localeCompare(b, 'ru'));
  }

  function populateTeacherSelect() {
    const sel = document.getElementById('teacher-pick');
    const teachers = getNamedTeachers();
    const current = sel.value;
    sel.innerHTML = '<option value="__all__">— выбери себя —</option>'
      + '<option value="__compact__">Всё расписание (общий вид)</option>'
      + teachers.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
    if (current && Array.from(sel.options).some(o => o.value === current)) sel.value = current;
  }

  function onTeacherChange() { renderForCurrentTeacher(); }

  // Активные рефы слота:
  // - slot.selectedRefs — массив, НЕПУСТОЙ → явный выбор админа (использовать именно эти).
  // - slot.selectedRefs — пустой массив (или нет) → использовать все рефы шаблона (из libraryRefs/LIBRARY).
  // ВАЖНО: пустой [] считается «по умолчанию», а не «нет ни одного». Иначе ни один слот никогда
  // не покажет рефы, потому что defaultSlot() инициализирует selectedRefs пустым массивом.
  function getActiveRefsForSlot(slot) {
    if (!slot || !slot.template) return [];
    if (slot.refsNone) return []; // педагог явно отключил рефы в этом слоте
    if (Array.isArray(slot.selectedRefs) && slot.selectedRefs.length > 0) return slot.selectedRefs.slice();
    // Дефолт — все рефы шаблона. Сначала из снимка (libraryRefs), потом из библиотеки.
    const tpl = String(slot.template).trim();
    const snapRefs = publishedState.libraryRefs && publishedState.libraryRefs[tpl];
    if (Array.isArray(snapRefs)) return snapRefs.slice();
    const target = tpl.toLowerCase();
    const lib = LIBRARY.find(a => String(a.template || '').trim().toLowerCase() === target);
    return (lib && Array.isArray(lib.refs)) ? lib.refs.slice() : [];
  }

  // По типу дня и половине возвращает массив «активных» слотов с подписью отрядов:
  // [{ idx, troopsLabel, isTrip, timeOverride? }]. Мусорные слоты выездных раскладок пропускаются.
  function activeSlotsForHalf(dayType, half) {
    const mode = halfMode4(dayType, half);
    if (mode === 'trip4')    return [{ idx: 0, troopsLabel: 'все 4 отряда', isTrip: true }];
    if (mode === 'trip2')    return [
      { idx: 0, troopsLabel: 'отряд 1', isTrip: false },
      { idx: 1, troopsLabel: 'отряд 2', isTrip: false },
      { idx: 2, troopsLabel: 'отряды 3, 4 (выезд)', isTrip: true }
    ];
    if (mode === 'parallel') return [
      { idx: 0, troopsLabel: 'отряды 1, 2 (выезд)', isTrip: true },
      { idx: 2, troopsLabel: 'отряды 3, 4 (выезд)', isTrip: true }
    ];
    if (mode === 'parallel2') {
      // 4 строки: 1-й круг (1-2→А, 3-4→Б), 2-й круг (1-2→Б, 3-4→А).
      // Времена дробятся пополам, чтобы у педагога было видно, в какой круг он стоит.
      const isAM = half === 'am';
      const t1 = isAM ? '9:30 – 11:30' : '14:00 – 15:45';
      const t2 = isAM ? '11:30 – 13:30' : '15:45 – 17:30';
      return [
        { idx: 0, troopsLabel: 'отряды 1, 2 · 1-й круг', isTrip: true, timeOverride: t1 },
        { idx: 2, troopsLabel: 'отряды 3, 4 · 1-й круг', isTrip: true, timeOverride: t1 },
        { idx: 2, troopsLabel: 'отряды 1, 2 · 2-й круг', isTrip: true, timeOverride: t2 },
        { idx: 0, troopsLabel: 'отряды 3, 4 · 2-й круг', isTrip: true, timeOverride: t2 }
      ];
    }
    // normal
    return [
      { idx: 0, troopsLabel: 'отряд 1', isTrip: false },
      { idx: 1, troopsLabel: 'отряд 2', isTrip: false },
      { idx: 2, troopsLabel: 'отряд 3', isTrip: false },
      { idx: 3, troopsLabel: 'отряд 4', isTrip: false }
    ];
  }
  function halfMode4(dOrType, half) {
    // Новая модель: объект дня с amType/pmType
    if (dOrType && typeof dOrType === 'object' && (dOrType.amType !== undefined || dOrType.pmType !== undefined)) {
      return dOrType[half + 'Type'] || 'normal';
    }
    // Старая модель: строка day.type (для совместимости со старыми публикациями)
    const type = String(dOrType || '');
    const isAM = half === 'am';
    switch (type) {
      case 'seq3_am':       return isAM ? 'seq3' : 'normal';
      case 'seq3_pm':       return isAM ? 'normal' : 'seq3';
      case 'seq3_full':     return 'seq3';
      case 'rot4_am':       return isAM ? 'rot4' : 'normal';
      case 'rot4_pm':       return isAM ? 'normal' : 'rot4';
      case 'rot4_full':     return 'rot4';
      case 'trip4_am':      return isAM ? 'trip4' : 'normal';
      case 'trip4_pm':      return isAM ? 'normal' : 'trip4';
      case 'trip2_am':      return isAM ? 'trip2' : 'normal';
      case 'trip2_pm':      return isAM ? 'normal' : 'trip2';
      case 'trip2_full':    return 'trip2';
      case 'parallel_am':   return isAM ? 'parallel' : 'normal';
      case 'parallel_pm':   return isAM ? 'normal' : 'parallel';
      case 'parallel_full': return 'parallel';
      default:              return 'normal';
    }
  }
  // Времена шагов внутри половины с несколькими МК (синхронно с index4).
  function multiStepTimes4(half, mode) {
    const fmt = (mins) => { const h = Math.floor(mins/60), m = mins%60; return h + ':' + String(m).padStart(2,'0'); };
    let startMin, endMin, n;
    if (half === 'am') {
      if (mode === 'seq3') { startMin = 600; endMin = 810; n = 3; }
      else                 { startMin = 570; endMin = 810; n = 4; }
    } else {
      if (mode === 'seq3') { startMin = 870; endMin = 1050; n = 3; }
      else                 { startMin = 840; endMin = 1050; n = 4; }
    }
    const step = Math.round((endMin - startMin) / n);
    const out = [];
    for (let i = 0; i < n; i++) {
      const a = startMin + i*step;
      const b = (i === n-1) ? endMin : startMin + (i+1)*step;
      out.push(fmt(a) + '–' + fmt(b));
    }
    return out;
  }

  function buildScheduleForTeacher(teacherName) {
    const target = normalizeName(teacherName);
    const result = [];
    publishedState.schedule.forEach((d, idx) => {
      const date = dateForDay(publishedState, idx);
      const dateStr = date.getDate() + ' ' + MONTHS[date.getMonth()];
      const weekday = WEEKDAYS[date.getDay()];
      const slots = [];
      ['am','pm'].forEach(half => {
        const mode = halfMode4(d, half);
        // Режим «много МК» — занятия из amMulti/pmMulti.
        if (mode === 'seq3' || mode === 'rot4') {
          const multi = d[half + 'Multi'];
          if (!multi) return;
          const times = multiStepTimes4(half, mode);
          if (mode === 'seq3') {
            // Модель: в каждой паре (1-2 и 3-4) — ротация-2 между двумя МК + общий третий слот.
            //   chainA[0] = МК A пары 1-2: 10:00 → отряд 1, 11:10 → отряд 2 (2 строки у педагога)
            //   chainA[1] = МК B пары 1-2: 10:00 → отряд 2, 11:10 → отряд 1 (2 строки у педагога)
            //   chainA[2] = общее занятие 12:20 → отряды 1, 2 (1 строка)
            // Для chainB: то же самое, но отряды 3 и 4.
            [['chainA', [1, 2]], ['chainB', [3, 4]]].forEach(([sub, troops]) => {
              const chain = multi[sub] || [];
              const [tropA, tropB] = troops;
              // chainA[0]: первый МК пары — отряд A в шаге 0, отряд B в шаге 1
              const s0 = chain[0];
              if (s0 && s0.template && normalizeName(s0.teacher) === target) {
                slots.push({ time: times[0] || '', template: s0.template, theme: s0.theme || '',
                  comment: s0.comment || '', room: s0.room || '—',
                  troopsLabel: 'отряд ' + tropA, troop: tropA, isTrip: false,
                  refs: getActiveRefsForSlot(s0), scored: !!s0.scored, mkKey: idx+'_'+half+'_'+sub+'_0_t'+tropA });
                slots.push({ time: times[1] || '', template: s0.template, theme: s0.theme || '',
                  comment: s0.comment || '', room: s0.room || '—',
                  troopsLabel: 'отряд ' + tropB, troop: tropB, isTrip: false,
                  refs: getActiveRefsForSlot(s0), scored: !!s0.scored, mkKey: idx+'_'+half+'_'+sub+'_0_t'+tropB });
              }
              // chainA[1]: второй МК пары — отряд B в шаге 0, отряд A в шаге 1 (противофаза)
              const s1 = chain[1];
              if (s1 && s1.template && normalizeName(s1.teacher) === target) {
                slots.push({ time: times[0] || '', template: s1.template, theme: s1.theme || '',
                  comment: s1.comment || '', room: s1.room || '—',
                  troopsLabel: 'отряд ' + tropB, troop: tropB, isTrip: false,
                  refs: getActiveRefsForSlot(s1), scored: !!s1.scored, mkKey: idx+'_'+half+'_'+sub+'_1_t'+tropB });
                slots.push({ time: times[1] || '', template: s1.template, theme: s1.theme || '',
                  comment: s1.comment || '', room: s1.room || '—',
                  troopsLabel: 'отряд ' + tropA, troop: tropA, isTrip: false,
                  refs: getActiveRefsForSlot(s1), scored: !!s1.scored, mkKey: idx+'_'+half+'_'+sub+'_1_t'+tropA });
              }
              // chainA[2]: общее занятие на оба отряда пары — одна строка
              const s2 = chain[2];
              if (s2 && s2.template && normalizeName(s2.teacher) === target) {
                slots.push({ time: times[2] || '', template: s2.template, theme: s2.theme || '',
                  comment: s2.comment || '', room: s2.room || '—',
                  troopsLabel: 'отряды ' + tropA + ', ' + tropB, troop: tropA, isTrip: false,
                  refs: getActiveRefsForSlot(s2), scored: !!s2.scored, mkKey: idx+'_'+half+'_'+sub+'_2_tAB' });
              }
            });
          } else {
            // rot4: педагог стоит на станции, через неё по очереди проходят все 4 отряда.
            // Порядок прихода зависит от номера станции: на шаге k у станции s сидит отряд
            // (s - k + 4) % 4. Поэтому педагогу показываем 4 строки — по одной на каждый шаг.
            (multi.stations || []).forEach((s, st) => {
              if (!s || !s.template || normalizeName(s.teacher) !== target) return;
              for (let k = 0; k < 4; k++) {
                const troopIdx = ((st - k) % 4 + 4) % 4; // отряд, который у этой станции на шаге k
                slots.push({
                  time: times[k] || '',
                  template: s.template, theme: s.theme || '',
                  comment: s.comment || '', room: s.room || '—',
                  troopsLabel: 'станция ' + (st+1) + ' · отряд ' + (troopIdx+1),
                  troop: troopIdx + 1, isTrip: false,
                  refs: getActiveRefsForSlot(s), scored: !!s.scored, mkKey: idx+'_'+half+'_stations_'+st+'_t'+(troopIdx+1)
                });
              }
            });
          }
          return;
        }
        // Режим «3 МК + выезд 2» — учится одна пара (chainA), едет другая.
        if (mode === 'seq3trip') {
          const multi = d[half + 'Multi'];
          if (!multi) return;
          const sg = multi.studyGroup || 'A';
          // Учащаяся пара: отряды (tropA, tropB). Едущая пара — на выезде.
          const tropA = (sg === 'A') ? 1 : 3;
          const tropB = (sg === 'A') ? 2 : 4;
          const tripLabel  = (sg === 'A') ? 'отряды 3, 4 (выезд)' : 'отряды 1, 2 (выезд)';
          const tripTroop  = (sg === 'A') ? 3 : 1;
          const tripIdx    = (sg === 'A') ? 2 : 0;
          const times = multiStepTimes4(half, 'seq3');
          const tripTime = half === 'am' ? TIME_AM : TIME_PM;
          const chain = multi.chainA || [];
          // chainA[0] — МК A: 10:00 → отряд A, 11:10 → отряд B (две строки)
          const s0 = chain[0];
          if (s0 && s0.template && normalizeName(s0.teacher) === target) {
            slots.push({ time: times[0] || '', template: s0.template, theme: s0.theme || '',
              comment: s0.comment || '', room: s0.room || '—',
              troopsLabel: 'отряд ' + tropA, troop: tropA, isTrip: false, refs: getActiveRefsForSlot(s0), scored: !!s0.scored, mkKey: idx+'_'+half+'_chainA_0_t'+tropA });
            slots.push({ time: times[1] || '', template: s0.template, theme: s0.theme || '',
              comment: s0.comment || '', room: s0.room || '—',
              troopsLabel: 'отряд ' + tropB, troop: tropB, isTrip: false, refs: getActiveRefsForSlot(s0), scored: !!s0.scored, mkKey: idx+'_'+half+'_chainA_0_t'+tropB });
          }
          // chainA[1] — МК B: 10:00 → отряд B, 11:10 → отряд A (противофаза)
          const s1 = chain[1];
          if (s1 && s1.template && normalizeName(s1.teacher) === target) {
            slots.push({ time: times[0] || '', template: s1.template, theme: s1.theme || '',
              comment: s1.comment || '', room: s1.room || '—',
              troopsLabel: 'отряд ' + tropB, troop: tropB, isTrip: false, refs: getActiveRefsForSlot(s1), scored: !!s1.scored, mkKey: idx+'_'+half+'_chainA_1_t'+tropB });
            slots.push({ time: times[1] || '', template: s1.template, theme: s1.theme || '',
              comment: s1.comment || '', room: s1.room || '—',
              troopsLabel: 'отряд ' + tropA, troop: tropA, isTrip: false, refs: getActiveRefsForSlot(s1), scored: !!s1.scored, mkKey: idx+'_'+half+'_chainA_1_t'+tropA });
          }
          // chainA[2] — общий третий слот: оба отряда пары в 12:20 (с кураторами, в разных кабинетах)
          const s2 = chain[2];
          if (s2 && s2.template && normalizeName(s2.teacher) === target) {
            slots.push({ time: times[2] || '', template: s2.template, theme: s2.theme || '',
              comment: s2.comment || '', room: s2.room || '—',
              troopsLabel: 'отряды ' + tropA + ', ' + tropB, troop: tropA, isTrip: false, refs: getActiveRefsForSlot(s2), scored: !!s2.scored, mkKey: idx+'_'+half+'_chainA_2_tAB' });
          }
          // Выезд другой пары
          const arr = d[half] || [];
          const ts = arr[tripIdx];
          if (ts && ts.template && normalizeName(ts.teacher) === target) {
            slots.push({
              time: tripTime, template: ts.template, theme: ts.theme || '',
              comment: ts.comment || '', room: ts.room || '—',
              troopsLabel: tripLabel, troop: tripTroop, isTrip: true,
              refs: getActiveRefsForSlot(ts), scored: !!ts.scored
            });
          }
          return;
        }
        const arr = d[half];
        if (!Array.isArray(arr)) return;
        const time = half === 'am' ? TIME_AM : TIME_PM;
        const active = activeSlotsForHalf(d, half);
        active.forEach(a => {
          const s = arr[a.idx];
          if (!s || !s.template) return;
          if (normalizeName(s.teacher) !== target) return;
          slots.push({
            time: a.timeOverride || time,
            template: s.template,
            theme: s.theme || '',
            comment: s.comment || '',
            room: s.room || '—',
            troopsLabel: a.troopsLabel,
            troop: a.idx + 1,
            isTrip: a.isTrip || !!s.isTrip,
            refs: getActiveRefsForSlot(s), scored: !!s.scored,
            mkKey: (a.isTrip || s.isTrip) ? '' : (idx+'_'+half+'_'+a.idx+'_t'+(a.idx+1))
          });
        });
      });
      result.push({ idx, dateStr, weekday, slots });
    });
    return result;
  }

            <div class="vslot-meta">

  function renderTeacherView(teacherName) {
    const days = buildScheduleForTeacher(teacherName);
    const totalSlots = days.reduce((s, d) => s + d.slots.length, 0);
    const tripSlots = days.reduce((s, d) => s + d.slots.filter(x => x.isTrip).length, 0);

    let html = `
      <div style="margin-bottom:14px;font-size:12px;color:rgba(21,22,23,0.65);text-align:center">
        <strong style="color:var(--ink)">${escapeHtml(teacherName)}</strong> · ${totalSlots} занятий${tripSlots > 0 ? ' · ' + tripSlots + ' выездн.' : ''}
      </div>`;

    days.forEach(d => {
      html += `
        <div class="vday">
          <div class="vday-head">
            <div class="vday-num">День ${d.idx + 1}</div>
            <div class="vday-meta">${d.dateStr} · ${d.weekday}</div>
          </div>
          <div class="vday-body">`;
      if (d.slots.length === 0) {
        html += `<div class="vday-rest">— свободный день —</div>`;
      } else {
        d.slots.forEach(s => { html += renderSlotInner(s); });
      }
      html += `</div></div>`;
    });
    document.getElementById('view-content').innerHTML = html;
    hydrateAllRefPreviews();
    if (window.LessonNotes) LessonNotes.loadStatuses();

  function renderRefsForSlot(refs) {
    if (!refs || refs.length === 0) return '';
    let html = '<div class="vslot-refs-grid">';
    refs.forEach(url => {
      let host = '';
      try { host = new URL(url).hostname.replace(/^www\./, ''); } catch(e) {}
      const icon = host.includes('pinterest') ? '📌' : (host.includes('youtube') || host.includes('youtu.be')) ? '🎬' : host.includes('google') ? '🖼' : '🔗';
      let previewSrc = null;
      const ytId = extractYouTubeId(url);
      if (ytId) previewSrc = 'https://img.youtube.com/vi/' + ytId + '/hqdefault.jpg';
      else if (/\.(jpg|jpeg|png|webp|gif|svg|avif)(\?|$)/i.test(url)) previewSrc = url;
      // Если прямого превью нет — проверяем кэш (если страница уже была спрошена у сервера ранее).
      else if (refPreviewCache[url]) previewSrc = refPreviewCache[url];

      if (previewSrc) {
        html += `<a href="${escapeHtml(url)}" target="_blank" rel="noopener" title="${escapeHtml(host)}">
          <img class="vslot-refs-img" src="${escapeHtml(previewSrc)}" alt="" onerror="this.style.display='none'">
        </a>`;
      } else {
        // Ссылка-плейсхолдер с пометкой data-ref-url — её подхватит hydrateAllRefPreviews().
        html += `<a href="${escapeHtml(url)}" target="_blank" rel="noopener" data-ref-url="${escapeHtml(url)}" style="padding:5px 10px;font-size:11px;background:rgba(254,214,52,0.18);border-color:rgba(254,214,52,0.5)" title="${escapeHtml(host)}">${icon} ${escapeHtml(host)}</a>`;
      }
    });
    html += '</div>';
    return html;
  }

  function extractYouTubeId(url) {
    const patterns = [
      /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
      /youtu\.be\/([a-zA-Z0-9_-]{11})/,
      /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/,
      /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/
    ];
    for (const p of patterns) { const m = url.match(p); if (m) return m[1]; }
    return null;
  }

  // Общий вид: все 4 отряда по дням (завтрак → утро ×4 → обед → вечер ×4).
  function renderCompactAllView() {
    let html = `
      <div style="font-family:Geologica,serif;font-style:italic;font-size:12px;color:rgba(21,22,23,0.55);text-align:center;margin-bottom:14px">
        Полное расписание смены · 4 отряда
      </div>`;
    publishedState.schedule.forEach((d, idx) => {
      const date = dateForDay(publishedState, idx);
      const dateStr = date.getDate() + ' ' + MONTHS[date.getMonth()];
      const weekday = WEEKDAYS[date.getDay()];
      html += `
        <div class="vday">
          <div class="vday-head">
            <div class="vday-num">День ${idx + 1}</div>
            <div class="vday-meta">${dateStr} · ${weekday}</div>
          </div>
          <div class="vday-body">`;

      const renderHalf = (half, time, label) => {
        const mode = halfMode4(d, half);
        // Режим «много МК»: показываем цепочки/станции со временами шагов.
        if (mode === 'seq3' || mode === 'rot4') {
          const multi = d[half + 'Multi'];
          if (!multi) return '';
          const times = multiStepTimes4(half, mode);
          let h = `<div class="vmeal"><span>${label}${mode==='rot4'?' · ротация 4':' · 3 МК'}</span><span class="vmeal-time">${time}</span></div>`;
          const card = (s, when, who) => {
            if (!s || !s.template) return '';
            return `<div class="vslot"><div class="vslot-row">
                <div class="vslot-time">${escapeHtml(when)}</div>
                <div>
                  <div class="vslot-name">${escapeHtml(s.template)}</div>
                  ${s.theme ? `<div class="vslot-theme">«${escapeHtml(s.theme)}»</div>` : ''}
                  <div class="vslot-meta">${escapeHtml(who)} · ${escapeHtml(s.teacher || '—')} · ${escapeHtml(s.room || '—')}</div>
                </div></div></div>`;
          };
          let body = '';
          if (mode === 'seq3') {
            // Новая модель: chainA[0]/[1] — два МК в ротации между отрядами пары, chainA[2] — общий слот.
            [['chainA', 1, 2], ['chainB', 3, 4]].forEach(([sub, tropA, tropB]) => {
              const chain = multi[sub] || [];
              if (chain[0]) {
                body += card(chain[0], times[0] || '', 'отряд ' + tropA);
                body += card(chain[0], times[1] || '', 'отряд ' + tropB);
              }
              if (chain[1]) {
                body += card(chain[1], times[0] || '', 'отряд ' + tropB);
                body += card(chain[1], times[1] || '', 'отряд ' + tropA);
              }
              if (chain[2]) {
                body += card(chain[2], times[2] || '', 'отряды ' + tropA + ', ' + tropB);
              }
            });
          } else {
            // rot4: подпись «отряды 1, 4, 3, 2» = в каком порядке они приходят к этой станции
            (multi.stations || []).forEach((s, st) => {
              const order = [0,1,2,3].map(k => ((st - k) % 4 + 4) % 4 + 1).join(', ');
              body += card(s, 'станция ' + (st+1), 'отряды ' + order);
            });
          }
          return body ? h + body : '';
        }
        // «3 МК + выезд 2»: одна пара учится (цепочка), другая едет
        if (mode === 'seq3trip') {
          const multi = d[half + 'Multi'];
          if (!multi) return '';
          const sg = multi.studyGroup || 'A';
          const studyLabel = (sg === 'A') ? 'отряды 1, 2' : 'отряды 3, 4';
          const tripLabel  = (sg === 'A') ? 'отряды 3, 4 (выезд)' : 'отряды 1, 2 (выезд)';
          const tripIdx    = (sg === 'A') ? 2 : 0;
          const times = multiStepTimes4(half, 'seq3');
          let h = `<div class="vmeal"><span>${label} · 3 МК + выезд 2</span><span class="vmeal-time">${time}</span></div>`;
          const card = (s, when, who, trip) => {
            if (!s || !s.template) return '';
            const tripBadge = trip ? '<span class="vslot-trip-badge">🚌 выезд</span>' : '';
            return `<div class="vslot${trip?' is-trip':''}"><div class="vslot-row">
                <div class="vslot-time">${escapeHtml(when)}</div>
                <div>
                  <div class="vslot-name">${tripBadge}${escapeHtml(s.template)}</div>
                  ${s.theme ? `<div class="vslot-theme">«${escapeHtml(s.theme)}»</div>` : ''}
                  <div class="vslot-meta">${escapeHtml(who)} · ${escapeHtml(s.teacher || '—')} · ${escapeHtml(s.room || '—')}</div>
                </div></div></div>`;
          };
          let body = '';
          const tropA = (sg === 'A') ? 1 : 3;
          const tropB = (sg === 'A') ? 2 : 4;
          const chain = multi.chainA || [];
          if (chain[0]) {
            body += card(chain[0], times[0] || '', 'отряд ' + tropA, false);
            body += card(chain[0], times[1] || '', 'отряд ' + tropB, false);
          }
          if (chain[1]) {
            body += card(chain[1], times[0] || '', 'отряд ' + tropB, false);
            body += card(chain[1], times[1] || '', 'отряд ' + tropA, false);
          }
          if (chain[2]) {
            body += card(chain[2], times[2] || '', 'отряды ' + tropA + ', ' + tropB, false);
          }
          const ts = (d[half] || [])[tripIdx];
          body += card(ts, time, tripLabel, true);
          return body ? h + body : '';
        }
        const arr = d[half];
        if (!Array.isArray(arr)) return '';
        const active = activeSlotsForHalf(d, half);
        const filled = active.map(a => ({ s: arr[a.idx], troop: a.idx + 1, label: a.troopsLabel, isTrip: a.isTrip, timeOverride: a.timeOverride }))
                             .filter(x => x.s && x.s.template);
        if (filled.length === 0) return '';
        let h = `<div class="vmeal"><span>${label}</span><span class="vmeal-time">${time}</span></div>`;
        filled.forEach(({ s, troop, label: troopsLabel, isTrip, timeOverride }) => {
          const trip = isTrip || !!s.isTrip;
          const tripBadge = trip ? '<span class="vslot-trip-badge">🚌 выезд</span>' : '';
          const timeBadge = timeOverride ? `<span class="vslot-time-inline">${escapeHtml(timeOverride)}</span> ` : '';
          h += `
            <div class="vslot${trip ? ' is-trip' : ''}">
              <div class="vslot-row">
                <div class="vslot-time"><span class="pill-troop t${troop}">${escapeHtml(troopsLabel || ('отряд ' + troop))}</span>${timeOverride ? '<br><span style="font-size:10px;color:var(--yellow-deep);font-style:italic">'+escapeHtml(timeOverride)+'</span>' : ''}</div>
                <div>
                  <div class="vslot-name">${tripBadge}${escapeHtml(s.template)}</div>
                  ${s.theme ? `<div class="vslot-theme">«${escapeHtml(s.theme)}»</div>` : ''}
                  ${s.comment ? `<div class="vslot-comment">💬 ${escapeHtml(s.comment)}</div>` : ''}
                  <div class="vslot-meta">${escapeHtml(s.teacher || '—')} · ${escapeHtml(s.room || '—')}</div>
                </div>
              </div>
            </div>`;
        });
        return h;
      };

      let body = '';
      body += renderHalf('am', TIME_AM, 'До обеда');
      body += renderHalf('pm', TIME_PM, 'После обеда');
      html += body || `<div class="vday-rest">— расписание не задано —</div>`;
      html += `</div></div>`;
    });
    document.getElementById('view-content').innerHTML = html;
    hydrateAllRefPreviews();
  }

          '</div>' +
        '</div>';
      document.body.appendChild(ov);
      ov.addEventListener('click', function (e) { if (e.target === ov) LessonNotes.close(); });
    }

    function setStatus(msg, isErr) {
      var s = el('ln-status');
      s.textContent = msg || '';
      s.className = 'ln-status' + (isErr ? ' err' : '');
    }

    function fmt(t) { var m = Math.floor(t / 60), s = t % 60; return m + ':' + (s < 10 ? '0' : '') + s; }

    function dayIdxFromKey(mkKey) {
      var n = parseInt(String(mkKey).split('_')[0], 10);
      return isNaN(n) ? '' : n;
    }

    function open(payloadJson) {
      ensureModal();
      ctx = JSON.parse(payloadJson);
      el('ln-sub').textContent = (ctx.mkName || 'занятие') + ' · ' + (ctx.troopsLabel || '') + (ctx.time ? ' · ' + ctx.time : '');
      el('ln-result').style.display = 'none';
      el('ln-text').value = '';
      el('ln-raw').textContent = '';
      el('ln-raw').className = 'ln-raw';
      seconds = 0; el('ln-timer').textContent = '0:00';
      el('ln-rec').className = 'ln-rec-btn'; el('ln-rec').textContent = '●';
      el('ln-hint').textContent = 'Нажми и наговори, что было на занятии';
      setStatus('');
      el('ln-overlay').classList.add('open');
      // подгрузим прежнюю запись, если была
      loadExisting();
    }

    function loadExisting() {
      var id = getQueryParam('id');
      if (!id || !ctx) return;
      fetch(LIBRARY_URL + '?action=getLessonNote&seasonId=' + encodeURIComponent(id) +
            '&mkKey=' + encodeURIComponent(ctx.mkKey))
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (d && d.found && d.textClean) {
            el('ln-text').value = d.textClean;
            el('ln-raw').textContent = d.textRaw || '';
            el('ln-result').style.display = 'block';
            setStatus('Найдена прежняя запись — можно переписать или поправить.');
          }
        })
        .catch(function () {});
    }

    function close() {
      stopTracks();
      if (timerId) { clearInterval(timerId); timerId = null; }
      var ov = el('ln-overlay');
      if (ov) ov.classList.remove('open');
    }

    function stopTracks() {
      if (stream) { stream.getTracks().forEach(function (t) { t.stop(); }); stream = null; }
    }

    function pickMime() {
      var cand = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg'];
      for (var i = 0; i < cand.length; i++) {
        if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(cand[i])) return cand[i];
      }
      return '';
    }

    function toggleRec() {
      if (mediaRecorder && mediaRecorder.state === 'recording') { stopRec(); return; }
      startRec();
    }

    function startRec() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('Браузер не поддерживает запись звука.', true); return;
      }
      setStatus('');
      navigator.mediaDevices.getUserMedia({ audio: true }).then(function (s) {
        stream = s;
        var mime = pickMime();
        chunks = [];
        try {
          mediaRecorder = mime ? new MediaRecorder(s, { mimeType: mime }) : new MediaRecorder(s);
        } catch (e) { mediaRecorder = new MediaRecorder(s); }
        mediaRecorder.ondataavailable = function (ev) { if (ev.data && ev.data.size) chunks.push(ev.data); };
        mediaRecorder.onstop = onStopped;
        mediaRecorder.start();
        el('ln-rec').className = 'ln-rec-btn recording';
        el('ln-rec').textContent = '■';
        el('ln-hint').textContent = 'Идёт запись… нажми ■ чтобы остановить';
        seconds = 0; el('ln-timer').textContent = '0:00';
        timerId = setInterval(function () {
          seconds++; el('ln-timer').textContent = fmt(seconds);
          if (seconds >= MAX_SECONDS) stopRec();
        }, 1000);
      }).catch(function () {
        setStatus('Нет доступа к микрофону. Разреши доступ в настройках браузера.', true);
      });
    }

    function stopRec() {
      if (timerId) { clearInterval(timerId); timerId = null; }
      if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
      el('ln-rec').className = 'ln-rec-btn';
      el('ln-rec').textContent = '●';
      el('ln-hint').textContent = 'Готово. Обрабатываю…';
    }

    function onStopped() {
      stopTracks();
      var blob = new Blob(chunks, { type: (mediaRecorder && mediaRecorder.mimeType) || 'audio/webm' });
      if (!blob.size) { setStatus('Пустая запись, попробуй ещё раз.', true); return; }
      setStatus('⏳ Расшифровываю и причёсываю текст (это занимает 10–40 сек)…');
      var reader = new FileReader();
      reader.onloadend = function () {
        var b64 = String(reader.result).split(',')[1];
        sendAudio(b64, blob.type);
      };
      reader.readAsDataURL(blob);
    }

    function sendAudio(b64, mime) {
      var body = { action: 'transcribeLesson', audioBase64: b64, mime: mime, mkName: ctx.mkName || '' };
      fetch(LIBRARY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // обходит CORS-preflight Apps Script
        body: JSON.stringify(body)
      })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (!d || !d.ok) { setStatus('Не удалось расшифровать: ' + ((d && d.error) || 'ошибка сервера'), true); return; }
          el('ln-text').value = d.textClean || d.textRaw || '';
          el('ln-raw').textContent = d.textRaw || '';
          el('ln-result').style.display = 'block';
          setStatus('Готово. Проверь текст и при желании поправь.');
        })
        .catch(function (e) { setStatus('Ошибка сети: ' + e.message, true); });
    }

    function toggleRaw() { el('ln-raw').classList.toggle('open'); }

    function save() {
      return doSave(false);
    }

    // silent=true — не трогаем кнопку/статус так шумно (используется перед отправкой).
    function doSave(silent) {
      var id = getQueryParam('id');
      var text = el('ln-text').value.trim();
      if (!text) { setStatus('Текст пустой.', true); return Promise.reject(); }
      var btn = el('ln-save'); if (!silent) btn.disabled = true;
      var body = {
        action: 'saveLessonNote', seasonId: id, mkKey: ctx.mkKey,
        teacher: ctx.teacher || '', dayIdx: dayIdxFromKey(ctx.mkKey),
        mkName: ctx.mkName || '', textRaw: el('ln-raw').textContent || '', textClean: text
      };
      return fetch(LIBRARY_URL, {
        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(body)
      })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (!silent) btn.disabled = false;
          if (d && d.ok) {
            statusCache[ctx.mkKey] = statusCache[ctx.mkKey] || {};
            statusCache[ctx.mkKey].hasText = true;
            refreshBadges();
            if (!silent) setStatus('✅ Сохранено.');
          } else if (!silent) {
            setStatus('Не удалось сохранить.', true);
          }
          return d;
        })
        .catch(function (e) {
          if (!silent) { btn.disabled = false; setStatus('Ошибка сети: ' + e.message, true); }
          throw e;
        });
    }

    function markSent() {
      var id = getQueryParam('id');
      return fetch(LIBRARY_URL, {
        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'markLessonSent', seasonId: id, mkKey: ctx.mkKey })
      })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (d && d.ok) {
            statusCache[ctx.mkKey] = statusCache[ctx.mkKey] || {};
            statusCache[ctx.mkKey].hasText = true;
            statusCache[ctx.mkKey].sent = true;
            refreshBadges();
          }
          return d;
        })
        .catch(function () {});
    }

    function again() {
      // Вернуть к экрану записи, текст оставить (вдруг захотят дозаписать поверх).
      el('ln-result').style.display = 'none';
      seconds = 0; el('ln-timer').textContent = '0:00';
      el('ln-rec').className = 'ln-rec-btn'; el('ln-rec').textContent = '●';
      el('ln-hint').textContent = 'Нажми и наговори заново';
      setStatus('Прежний текст сохранён. Новая запись заменит его после обработки.');
    }

    function toViber() {
      var text = el('ln-text').value.trim();
      if (!text) { setStatus('Сначала наговори или впиши текст.', true); return; }
      // Сначала тихо сохраняем и отмечаем отправку, потом открываем Viber.
      doSave(true).then(markSent).then(function () {
        window.location.href = 'viber://forward?text=' + encodeURIComponent(text);
        setStatus('Открываю Viber… Если текст не подставился — нажми «Скопировать» и вставь вручную.');
      }).catch(function () {
        // Даже если сохранение не прошло — всё равно открываем Viber, текст у педагога есть.
        window.location.href = 'viber://forward?text=' + encodeURIComponent(text);
      });
    }

    function copy() {
      var text = el('ln-text').value.trim();
      if (!text) { setStatus('Текст пустой.', true); return; }
      doSave(true).then(markSent);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(
          function () { setStatus('📋 Скопировано — вставь в нужный чат Viber.'); },
          function () { fallbackCopy(text); }
        );
      } else { fallbackCopy(text); }
    }

    function fallbackCopy(text) {
      var ta = el('ln-text'); ta.focus(); ta.select();
      try { document.execCommand('copy'); setStatus('📋 Скопировано — вставь в нужный чат Viber.'); }
      catch (e) { setStatus('Скопируй текст вручную.', true); }
    }

    // Подтянуть статусы всех записей смены и расставить бейджи. Зовётся после отрисовки расписания.
    function loadStatuses() {
      var id = getQueryParam('id');
      if (!id) return;
      fetch(LIBRARY_URL + '?action=listLessonNotes&seasonId=' + encodeURIComponent(id))
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (d && d.ok && d.notes) { statusCache = d.notes; refreshBadges(); }
        })
        .catch(function () {});
    }

    // Обновить бейджи на кнопках записи в расписании по statusCache.
    function refreshBadges() {
      var btns = document.querySelectorAll('.vslot-lesson-btn[data-mkkey]');
      Array.prototype.forEach.call(btns, function (btn) {
        var key = btn.getAttribute('data-mkkey');
        var st = statusCache[key];
        var label = btn.parentNode ? btn.parentNode.querySelector('.ln-badge[data-mkkey="' + key + '"]') : null;
        if (!st || (!st.hasText && !st.sent)) { if (label) label.remove(); return; }
        var txt = st.sent ? '✅ отправлено' : '💾 сохранено';
        var cls = st.sent ? 'ln-badge sent' : 'ln-badge saved';
        if (!label) {
          label = document.createElement('span');
          label.setAttribute('data-mkkey', key);
          btn.parentNode.insertBefore(label, btn.nextSibling);
        }
        label.className = cls;
        label.textContent = txt;
      });
    }

    return { open: open, close: close, toggleRec: toggleRec, toggleRaw: toggleRaw,
             save: save, toViber: toViber, copy: copy, again: again,
             loadStatuses: loadStatuses, refreshBadges: refreshBadges };
  })();
</script>
</body>
</html>
